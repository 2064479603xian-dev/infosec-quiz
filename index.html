{"type":"judge","question":"在分组密码中，初始置换(IP)和逆初始置换(IP^-1)是相同的操作","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":624},{"type":"judge","question":"明文攻击是一种通过分析加密结果来推断明文的攻击方法","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":625},{"type":"judge","question":"在AES算法中，每个字节可以看作是一个有限域GF(28)上的元素","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":626},{"type":"judge","question":"弱密钥是一种，在特定的加密算法和密钥长度下，使得加密结果容易被破解的密钥","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":627},{"type":"judge","question":"在分组密码中，轮函数是一个将明文与子密钥进行处理的函数。","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":628},{"type":"judge","question":"在公钥加密中，仅能使用公钥加密、私钥解密","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":629},{"type":"judge","question":"在Diffie-Hellman密钥交换协议中，交换的数据包括公共参数、各自的本地私钥、以及协商出来的会话密钥","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":630},{"type":"judge","question":"漏洞利用是一种攻击技术，通过利用软件或系统中的安全漏洞，实现对目标系统的控制和入侵","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":631},{"type":"judge","question":"只有黑客才能利用漏洞，普通用户不具备漏洞利用的能力","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":632},{"type":"judge","question":"漏洞利用需要具备专业的技术知识和技能，对计算机系统有深入的了解","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":633},{"type":"judge","question":"漏洞利用只存在于传统计算机系统中，对于移动设备和物联网设备等新型设备没有影响","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":634},{"type":"judge","question":"漏洞利用可以通过手动操作和自动化工具两种方式进行","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":635},{"type":"judge","question":"漏洞利用的成功与否与目标系统的补丁更新速度和独立开发的能力有关","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":636},{"type":"judge","question":"漏洞利用是绕过系统的安全机制来实现对系统的攻击","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":637},{"type":"judge","question":"通过漏洞利用可以获取系统的敏感信息和控制权","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":638},{"type":"judge","question":"漏洞利用的最终目的是为了实现自己的利益，例如偷取财产、获取机密信息等","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":639},{"type":"judge","question":"漏洞利用是一种合法的技术手段，只要不造成损害就可以使用","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":640},{"type":"judge","question":"漏洞利用是一种被动攻击，需要等待目标系统有漏洞才能实施","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":641},{"type":"judge","question":"通过加强系统安全机制和定期更新补丁可以有效避免漏洞利用","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":642},{"type":"judge","question":"漏洞利用可以通过网络攻击、物理攻击和社交工程等方式实现","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":643},{"type":"judge","question":"只有黑客才会利用漏洞，普通用户不需要关注漏洞利用的问题","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":644},{"type":"judge","question":"僵尸网络和DDoS攻击都是通过漏洞利用来实现的","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":645},{"type":"judge","question":"漏洞是计算机系统中的一种错误或缺陷，可能导致安全问题。","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":646},{"type":"judge","question":"所有漏洞都会导致系统崩溃","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":647},{"type":"judge","question":"在网络安全方面，漏洞是指网络通讯协议中未能修补的缺陷或弱点","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":648},{"type":"judge","question":"代码注入漏洞只能通过修改应用程序源代码来修复","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":649},{"type":"judge","question":"SQL注入攻击是一种针对数据库的漏洞利用技术","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":650},{"type":"judge","question":"通过输入超出预期的数据，可以触发缓冲区溢出漏洞","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":651},{"type":"judge","question":"拒绝服务攻击是利用系统漏洞使其无法正常工作的攻击方式","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":652},{"type":"judge","question":"所有漏洞都可以通过软件更新或升级来修复","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":653},{"type":"judge","question":"加密算法的漏洞可能导致信息泄露","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":654},{"type":"judge","question":"只要使用了最新的软件和硬件，就不会存在漏洞问题","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":655},{"type":"judge","question":"逆向工程可以用于发现软件的漏洞","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":656},{"type":"judge","question":"跨站脚本攻击是指在受害者的网页上注入恶意脚本，以获取用户的个人信息","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":657}]}</script>
<script>
(() => {
  'use strict';
  const DATA = JSON.parse(document.getElementById('questionData').textContent);
  const QUESTIONS = DATA.questions;
  const TYPE_LABEL = {single:'单选',multi:'多选',judge:'判断',fill:'填空'};
  const STORE_KEY = 'quiz_security_v2_' + DATA.stats.dedupedQuestionCount;
  const SETTINGS_KEY = STORE_KEY + '_settings';
  let progress = loadJSON(STORE_KEY, {});
  let settings = Object.assign({type:'all',status:'all',order:'normal',autoNext:false,search:''}, loadJSON(SETTINGS_KEY, {}));
  let selected = new Set();
  let view = [];
  let current = 0;

  const el = id => document.getElementById(id);
  const card = el('questionCard');

  // Init theme
  (() => {
    const saved = localStorage.getItem('quiz_theme');
    const theme = saved || 'aurora';
    applyTheme(theme);
    el('themeSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (!btn) return;
      const t = btn.dataset.theme;
      applyTheme(t);
      localStorage.setItem('quiz_theme', t);
    });
  })();
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    el('themeSwitcher').querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === t);
    });
  }

  // Init pills
  (() => {
    const items = [
      DATA.stats.sourceFile,
      `共 ${DATA.stats.dedupedQuestionCount} 题`,
      `单选 ${DATA.stats.typeCount['单选']||0}`,
      `多选 ${DATA.stats.typeCount['多选']||0}`,
      `判断 ${DATA.stats.typeCount['判断']||0}`,
      `填空 ${DATA.stats.typeCount['填空']||0}`,
    ];
    el('sourcePills').replaceChildren(...items.map(t => {
      const s = document.createElement('span'); s.className='pill'; s.textContent=t; return s;
    }));
  })();

  // Bind controls
  el('search').value = settings.search || '';
  el('orderMode').value = settings.order || 'normal';
  el('autoNext').checked = !!settings.autoNext;
  el('search').addEventListener('input', () => { settings.search = el('search').value.trim(); rebuild(true); });
  el('orderMode').addEventListener('change', () => { settings.order = el('orderMode').value; rebuild(true); });
  el('autoNext').addEventListener('change', () => { settings.autoNext = el('autoNext').checked; saveSettings(); });
  el('reshuffle').addEventListener('click', () => { settings.order = 'random'; el('orderMode').value = 'random'; rebuild(true, true); });
  el('resetProgress').addEventListener('click', () => {
    if (!confirm('确定清空所有练习记录？')) return;
    progress = {}; localStorage.removeItem(STORE_KEY); selected = new Set(); rebuild(true);
  });
  el('exportWrong').addEventListener('click', exportWrong);
  window.addEventListener('keydown', handleKeys);

  // Type chips
  document.querySelectorAll('[data-type]').forEach(c => {
    if (c.dataset.type === (settings.type || 'all')) c.classList.add('active');
    else c.classList.remove('active');
    c.addEventListener('click', () => {
      document.querySelectorAll('[data-type]').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      settings.type = c.dataset.type;
      rebuild(true);
    });
  });
  // Status chips
  document.querySelectorAll('[data-status]').forEach(c => {
    if (c.dataset.status === (settings.status || 'all')) c.classList.add('active');
    else c.classList.remove('active');
    c.addEventListener('click', () => {
      document.querySelectorAll('[data-status]').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      settings.status = c.dataset.status;
      rebuild(true);
    });
  });

  rebuild(false);

  function loadJSON(key, fb) { try { return JSON.parse(localStorage.getItem(key)) ?? fb; } catch { return fb; } }
  function saveProgress() { localStorage.setItem(STORE_KEY, JSON.stringify(progress)); }
  function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
  function answerLetters(q) { return String(q.answer||'').toUpperCase().split('').filter(Boolean).sort().join(''); }
  function normalizeFill(s) { return String(s||'').replace(/[\s，,。；;：:、]/g,'').toLowerCase(); }
  function optionText(q, letters) {
    if (q.type==='fill') return q.answer;
    const set = new Set(String(letters).split(''));
    return q.options.filter(o=>set.has(o.label)).map(o=>o.label+'. '+o.text).join('；');
  }
  function isCorrect(q, value) {
    if (q.type==='fill') return normalizeFill(value)===normalizeFill(q.answer);
    return String(value).split('').sort().join('')===answerLetters(q);
  }
  function qTextBlob(q) { return [q.question,...(q.options||[]).map(o=>o.text)].join('').toLowerCase(); }

  function buildView() {
    const kw = (settings.search||'').toLowerCase();
    let arr = QUESTIONS.filter(q => {
      const p = progress[q.id];
      if (settings.type!=='all' && q.type!==settings.type) return false;
      if (settings.status==='correct' && (!p||p.correct!==true)) return false;
      if (settings.status==='wrong' && (!p||p.correct!==false)) return false;
      if (settings.status==='unanswered' && p) return false;
      if (kw && !qTextBlob(q).includes(kw)) return false;
      return true;
    });
    if (settings.order==='random') arr = shuffle(arr.slice());
    return arr;
  }
  function shuffle(arr) {
    for (let i=arr.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }
  function rebuild(resetIdx, forceShuffle=false) {
    if (forceShuffle) settings.order='random';
    saveSettings();
    view = buildView();
    if (resetIdx||current>=view.length) current=0;
    selected = new Set();
    renderAll();
  }
  function renderAll() { renderQuestion(); renderStats(); renderNav(); }

  function renderQuestion() {
    card.replaceChildren();
    if (!view.length) {
      const d=document.createElement('div'); d.className='empty';
      d.innerHTML='<h2>没有符合条件的题目</h2><p>请调整筛选条件或搜索词。</p>';
      card.appendChild(d); return;
    }
    const q = view[current];
    const saved = progress[q.id];
    selected = new Set(saved&&saved.selected&&q.type!=='fill'?saved.selected.split(''):[]);

    const top=document.createElement('div'); top.className='q-top';
    const badge=document.createElement('span'); badge.className='badge'; badge.textContent=TYPE_LABEL[q.type]||q.type;
    const counter=document.createElement('span'); counter.className='counter';
    counter.textContent=`第 ${current+1} / ${view.length} 题（原题号 #${q.id}）`;
    top.append(badge,counter);
    const qt=document.createElement('div'); qt.className='question-text'; qt.textContent=q.question;
    card.append(top,qt);
    if (q.type==='fill') renderFill(q,saved); else renderOptions(q,saved);
    renderActions(q,saved);
  }

  function renderOptions(q, saved) {
    const wrap=document.createElement('div'); wrap.className='options';
    const submitted=!!saved;
    const correctLetters=new Set(answerLetters(q).split(''));
    const selectedLetters=new Set(submitted?String(saved.selected||'').split(''):selected);
    q.options.forEach(o => {
      const btn=document.createElement('button');
      btn.type='button'; btn.className='option'; btn.dataset.label=o.label;
      if (selectedLetters.has(o.label)) btn.classList.add('selected');
      if (submitted&&correctLetters.has(o.label)) btn.classList.add('correct');
      if (submitted&&selectedLetters.has(o.label)&&!correctLetters.has(o.label)) btn.classList.add('wrong');
      if (submitted) btn.disabled=true;
      const letter=document.createElement('span'); letter.className='letter'; letter.textContent=o.label;
      const text=document.createElement('span'); text.className='option-text'; text.textContent=o.text;
      btn.append(letter,text);
      btn.addEventListener('click', ()=>chooseOption(q,o.label));
      wrap.appendChild(btn);
    });
    card.appendChild(wrap);
    renderResult(q, saved);
  }

  function renderFill(q, saved) {
    const area=document.createElement('div'); area.className='fill-area';
    const input=document.createElement('input'); input.className='fill-input';
    input.placeholder='输入答案后按 Enter 提交';
    input.value=saved?(saved.selected||''):'';
    input.disabled=!!saved;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submitAnswer(q,input.value); });
    const btn=document.createElement('button'); btn.className='btn primary'; btn.type='button'; btn.textContent='提交答案';
    btn.disabled=!!saved;
    btn.addEventListener('click', ()=>submitAnswer(q,input.value));
    area.append(input,btn);
    card.appendChild(area);
    renderResult(q, saved);
    if (!saved) setTimeout(()=>input.focus(),0);
  }

  function chooseOption(q, label) {
    if (progress[q.id]) return;
    if (q.type==='multi') {
      if (selected.has(label)) selected.delete(label); else selected.add(label);
      renderSelectionOnly();
      if (selected.size===answerLetters(q).length) submitAnswer(q,Array.from(selected).sort().join(''));
    } else {
      selected=new Set([label]);
      submitAnswer(q,label);
    }
  }
  function renderSelectionOnly() {
    document.querySelectorAll('.option').forEach(btn=>{
      btn.classList.toggle('selected',selected.has(btn.dataset.label));
    });
  }

  function submitAnswer(q, value) {
    if (progress[q.id]) return;
    value=String(value||'').trim();
    if (!value) return;
    const correct=isCorrect(q,value);
    progress[q.id]={selected:value,correct,time:new Date().toISOString()};
    saveProgress();
    renderAll();
    if (correct&&settings.autoNext&&current<view.length-1) {
      setTimeout(()=>{ current++; selected=new Set(); renderAll(); },550);
    }
  }

  function renderResult(q, saved) {
    const box=document.createElement('div');
    if (!saved) { box.className='result'; card.appendChild(box); return; }
    box.className='result show '+(saved.correct?'ok':'bad');
    const header=document.createElement('div'); header.className='result-header';
    header.textContent=saved.correct?'✓ 回答正确！':'✗ 回答错误';
    const detail=document.createElement('div'); detail.className='result-detail';
    const userAns=q.type==='fill'?saved.selected:optionText(q,saved.selected);
    const rightAns=q.type==='fill'?q.answer:optionText(q,q.answer);
    if (!saved.correct) detail.textContent=`你的答案：${userAns||'未记录'} ｜ 正确答案：${rightAns}`;
    else detail.textContent=`正确答案：${rightAns}`;
    box.append(header,detail);
    card.appendChild(box);
  }

  function renderActions(q, saved) {
    const actions=document.createElement('div'); actions.className='actions';
    const prev=btn2('← 上一题',()=>move(-1),'btn'); prev.disabled=current<=0;
    const next=btn2('下一题 →',()=>move(1),'btn primary'); next.disabled=current>=view.length-1;
    actions.append(prev,next);
    if (q&&q.type==='multi'&&!saved) {
      actions.append(btn2('清空多选',()=>{selected.clear();renderSelectionOnly();},'btn'));
      actions.append(btn2('手动提交',()=>submitAnswer(q,Array.from(selected).sort().join('')),'btn'));
    }
    if (saved) actions.append(btn2('重做本题',()=>retry(q),'btn danger'));
    card.appendChild(actions);
  }
  function btn2(text,fn,cls) {
    const b=document.createElement('button'); b.type='button'; b.className=cls;
    b.textContent=text; b.addEventListener('click',fn); return b;
  }
  function move(delta) {
    if (!view.length) return;
    current=Math.min(Math.max(current+delta,0),view.length-1);
    selected=new Set(); renderAll();
  }
  function retry(q) { delete progress[q.id]; saveProgress(); selected=new Set(); renderAll(); }

  function renderStats() {
    const ids=new Set(view.map(q=>q.id));
    const answered=Object.entries(progress).filter(([id])=>ids.has(Number(id)));
    const correct=answered.filter(([,p])=>p.correct).length;
    const wrong=answered.filter(([,p])=>!p.correct).length;
    el('statTotal').textContent=String(view.length);
    el('statAnswered').textContent=String(answered.length);
    el('statCorrect').textContent=String(correct);
    el('statWrong').textContent=String(wrong);
    el('statRate').textContent=answered.length?Math.round(correct/answered.length*100)+'%':'—';
    el('progressFill').style.width=view.length?(answered.length/view.length*100).toFixed(1)+'%':'0%';
  }

  function renderNav() {
    const nav=el('navList'); nav.replaceChildren();
    const frag=document.createDocumentFragment();
    view.forEach((q,i)=>{
      const b=document.createElement('button'); b.type='button'; b.className='nav-dot';
      b.textContent=i+1; b.title=q.question.slice(0,80);
      const p=progress[q.id];
      if (i===current) b.classList.add('current');
      if (p) b.classList.add(p.correct?'done':'wrong');
      b.addEventListener('click',()=>{ current=i; selected=new Set(); renderAll(); });
      frag.appendChild(b);
    });
    nav.appendChild(frag);
  }

  function exportWrong() {
    const wrong=QUESTIONS.filter(q=>progress[q.id]&&progress[q.id].correct===false).map(q=>({
      id:q.id,type:TYPE_LABEL[q.type]||q.type,question:q.question,
      answer:q.answer,answerText:q.type==='fill'?q.answer:optionText(q,q.answer),
      yourAnswer:progress[q.id].selected,
      yourAnswerText:q.type==='fill'?progress[q.id].selected:optionText(q,progress[q.id].selected),
      options:q.options
    }));
    if (!wrong.length) { alert('当前没有错题可导出。'); return; }

    const rows=wrong.map((w,i)=>(
      '<div class=item>'
      +'<div class=item-head><span class=num>'+(i+1)+'</span><span class=type>'+esc(w.type)+'</span><span class=id>原题号 #'+w.id+'</span></div>'
      +'<div class=qtext>'+esc(w.question)+'</div>'
      +(w.options?('<div class=opts>'+w.options.map(o=>{
        const isRight=w.answer.includes(o.label);
        const isWrong=w.yourAnswer.includes(o.label)&&!isRight;
        let cls='opt'; if(isRight) cls+=' opt-ok'; if(isWrong) cls+=' opt-bad';
        return '<div class='+cls+'><span class=opt-letter>'+esc(o.label)+'</span>'+esc(o.text)+'</div>';
      }).join('')+'</div>'):'')
      +'<div class=ans-row>你的答案：<span class=bad-ans>'+esc(w.yourAnswerText||'未记录')+'</span></div>'
      +'<div class=ans-row>正确答案：<span class=ok-ans>'+esc(w.answerText)+'</span></div>'
      +'</div>'
    )).join('');

    const html='<!doctype html>\n<html lang=zh-CN>\n<head>\n<meta charset=utf-8>\n<meta name=viewport content=\"width=device-width,initial-scale=1\">\n<title>错题回顾</title>\n<style>\n'
      +'*{margin:0;padding:0;box-sizing:border-box}\n'
      +'body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",\"Microsoft YaHei\",sans-serif;background:#f5f5f5;color:#222;padding:16px;line-height:1.7}\n'
      +'.header{text-align:center;padding:24px 0 8px}\n'
      +'.header h1{font-size:22px;margin-bottom:6px}\n'
      +'.header p{color:#888;font-size:14px}\n'
      +'.item{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}\n'
      +'.item-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}\n'
      +'.num{width:26px;height:26px;display:grid;place-items:center;border-radius:50%;background:#4361ee;color:#fff;font-size:13px;font-weight:700}\n'
      +'.type{font-size:12px;background:#eef1fd;color:#4361ee;padding:2px 8px;border-radius:999px;font-weight:600}\n'
      +'.id{font-size:12px;color:#aaa;margin-left:auto}\n'
      +'.qtext{font-size:16px;font-weight:600;margin-bottom:14px;white-space:pre-wrap}\n'
      +'.opts{display:grid;gap:8px;margin-bottom:14px}\n'
      +'.opt{padding:10px 14px;border-radius:10px;border:1px solid #e5e5e5;background:#fafafa;font-size:15px;display:flex;align-items:flex-start;gap:10px}\n'
      +'.opt-letter{width:28px;height:28px;display:grid;place-items:center;border-radius:7px;background:#eee;font-weight:800;font-size:13px;flex-shrink:0}\n'
      +'.opt-ok{background:#ecfdf5;border-color:#a7f3d0}\n'
      +'.opt-ok .opt-letter{background:#059669;color:#fff}\n'
      +'.opt-bad{background:#fef2f2;border-color:#fecaca}\n'
      +'.opt-bad .opt-letter{background:#dc2626;color:#fff}\n'
      +'.ans-row{font-size:14px;margin-top:8px}\n'
      +'.bad-ans{color:#dc2626;font-weight:600}\n'
      +'.ok-ans{color:#059669;font-weight:600}\n'
      +'</style>\n</head>\n<body>\n'
      +'<div class=header><h1>错题回顾</h1><p>共 '+wrong.length+' 道错题</p></div>\n'
      +rows
      +'\n</body>\n</html>';

    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='错题回顾.html'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function handleKeys(e) {
    if (e.target&&['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    if (!view.length) return;
    const q=view[current];
    if (/^[1-8]$/.test(e.key)&&q&&q.type!=='fill') {
      const opt=q.options[Number(e.key)-1];
      if (opt) chooseOption(q,opt.label);
    } else if (e.key==='ArrowLeft') move(-1);
    else if (e.key==='ArrowRight') move(1);
    else if (e.key.toLowerCase()==='r') retry(q);
  }
})();
</script>
</body>
</html>
