<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>信息安全员三级理论刷题工具（网页版）</title>
<style>
/* ===== CSS Variables ===== */
/* A: 深夜极光 — 纯黑底+青绿紫光晕，护眼，信息安全风 */
[data-theme="aurora"], :root {
  --bg: #020812; --bg-alt: #070f20; --panel: rgba(10,18,35,.90); --panel-solid: #0a1223;
  --text: #dce4f0; --text-2: #8899b8; --text-3: #526688;
  --border: #162038; --border-light: #101b2e;
  --accent: #00d4aa; --accent-light: #0a2a28; --accent-deep: #00e5a0;
  --green: #00e676; --green-bg: #0a2818; --green-border: #1a5430;
  --red: #ff5277; --red-bg: #280a14; --red-border: #5c1a2e;
  --amber: #ffb74d; --amber-bg: #2a1a08;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.5);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.4);
  --shadow: 0 4px 16px rgba(0,0,0,.65), 0 1px 3px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.75), 0 2px 8px rgba(0,0,0,.5);
  --hero-from: #010515; --hero-via: #091838; --hero-to: #1a1060;
  --hero-glow: rgba(0,212,170,.28);
  --hero-glow-2: rgba(124,58,237,.22);
  --q-bg: #070f20; --q-border: #162038;
  --stat-bg: #070f20; --stat-border: #162038;
  --kbd-bg: #101b2e; --sb-thumb: #1e3050;
}
/* B: 赛博紫金 — 深紫底+金色高亮，终端/CTF风 */
[data-theme="cyber"] {
  --bg: #0d0221; --bg-alt: #12062b; --panel: rgba(20,8,44,.90); --panel-solid: #14082c;
  --text: #e8dff5; --text-2: #a894c8; --text-3: #6e5a8c;
  --border: #2a1548; --border-light: #1f1038;
  --accent: #fbbf24; --accent-light: #2e2008; --accent-deep: #f59e0b;
  --green: #22ff88; --green-bg: #082818; --green-border: #1a5432;
  --red: #ff4060; --red-bg: #280a14; --red-border: #5c1a2e;
  --amber: #fbbf24; --amber-bg: #2e2008;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.5);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.4);
  --shadow: 0 4px 16px rgba(0,0,0,.65), 0 1px 3px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.75), 0 2px 8px rgba(0,0,0,.5);
  --hero-from: #0a0118; --hero-via: #1a0840; --hero-to: #3d1060;
  --hero-glow: rgba(251,191,36,.25);
  --hero-glow-2: rgba(168,85,247,.18);
  --q-bg: #100620; --q-border: #241238;
  --stat-bg: #100620; --stat-border: #241238;
  --kbd-bg: #1a1030; --sb-thumb: #382858;
}
/* C: 磨砂玻璃 — 粉蓝渐变底+毛玻璃卡片，现代明亮 */
[data-theme="glass"] {
  --bg: #f0f4fa; --bg-alt: #f8fafd; --panel: rgba(255,255,255,.68); --panel-solid: #ffffff;
  --text: #1a1d2e; --text-2: #5a6072; --text-3: #9aa0b4;
  --border: rgba(0,0,0,.08); --border-light: rgba(0,0,0,.04);
  --accent: #5b6af0; --accent-light: #eef0fd; --accent-deep: #404fd4;
  --green: #10a868; --green-bg: #ecfaf4; --green-border: #a0e8c8;
  --red: #e04860; --red-bg: #fef4f6; --red-border: #f8c4cc;
  --amber: #c8780a; --amber-bg: #fffaf0;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.03);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.03);
  --shadow: 0 4px 20px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.03);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
  --hero-from: #2d2050; --hero-via: #4b3a7c; --hero-to: #6b5ce7;
  --hero-glow: rgba(107,92,231,.18);
  --hero-glow-2: rgba(240,100,130,.12);
  --q-bg: #fafbfd; --q-border: rgba(0,0,0,.06);
  --stat-bg: #fafbfd; --stat-border: rgba(0,0,0,.06);
  --kbd-bg: #fff; --sb-thumb: #c8cdd8;
}

/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .4s ease,color .4s ease;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  line-height:1.6;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 5%,var(--hero-glow) 0%,transparent 55%),
    radial-gradient(ellipse 55% 55% at 80% 90%,var(--hero-glow-2,transparent) 0%,transparent 50%);
  opacity:.75;transition:background .4s ease;
}
[data-theme="glass"] body::before{
  background:
    linear-gradient(160deg,#e8e0f0 0%,#f0e8f8 20%,#f5f0fa 40%,#faf5fb 60%,#fdf2f4 80%,#fef0f2 100%);
  opacity:.6;
}
button,input,select,textarea{font:inherit;color:inherit;}
button{cursor:pointer;border:none;background:none;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--sb-thumb);border-radius:3px;}

/* ===== App Shell ===== */
.app{max-width:1360px;margin:0 auto;padding:24px 28px;position:relative;z-index:1;}

/* ===== Hero ===== */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--hero-from) 0%,var(--hero-via) 40%,var(--hero-to) 100%);
  color:#fff;border-radius:var(--radius-lg);padding:28px 36px;
  box-shadow:var(--shadow-lg),0 0 0 1px rgba(255,255,255,.06) inset;
  margin-bottom:20px;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L31 35M5 30L55 30' stroke='rgba(255,255,255,.03)' stroke-width='.5'/%3E%3C/svg%3E");
  opacity:.6;pointer-events:none;
}
.hero::after{
  content:'';position:absolute;top:-80px;right:-80px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.07) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.hero h1{
  margin:0 0 6px;font-size:clamp(22px,3.5vw,38px);letter-spacing:-.03em;
  font-weight:800;position:relative;z-index:1;
  background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.82) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{margin:0;color:rgba(255,255,255,.72);line-height:1.75;font-size:14px;position:relative;z-index:1;}
.hero .pillrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;position:relative;z-index:1;}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:999px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  font-size:12px;font-weight:500;letter-spacing:.01em;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}

/* ===== Theme Switcher ===== */
.theme-switcher{
  position:absolute;top:20px;right:26px;z-index:2;
  display:flex;gap:2px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
  border-radius:999px;padding:3px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.theme-btn{
  width:34px;height:34px;display:grid;place-items:center;
  border-radius:50%;font-size:15px;cursor:pointer;
  transition:all .22s cubic-bezier(.4,0,.2,1);line-height:1;
  position:relative;
}
.theme-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.08);}
.theme-btn.active{
  background:rgba(255,255,255,.22);
  box-shadow:0 2px 8px rgba(0,0,0,.2),0 0 0 2px rgba(255,255,255,.1);
}

/* ===== Layout ===== */
.three-col{display:grid;grid-template-columns:228px minmax(0,1fr) 312px;gap:18px;align-items:start;}

/* ===== Sidebar ===== */
.sidebar{position:sticky;top:20px;display:flex;flex-direction:column;gap:14px;}
.filter-panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:background .4s,border-color .4s,box-shadow .4s;
}
.filter-panel h3{
  margin:0 0 14px;font-size:11px;font-weight:700;color:var(--text-3);
  letter-spacing:.08em;text-transform:uppercase;
}
.filter-group{margin-bottom:16px;}
.filter-group:last-child{margin-bottom:0;}
.filter-group label{
  display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:7px;
}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  padding:5px 12px;border-radius:999px;border:1px solid var(--border);
  background:var(--bg-alt);color:var(--text-2);font-size:12px;
  cursor:pointer;transition:all .18s ease;font-weight:500;
}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.chip.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.chip.ok:hover{background:var(--green);color:#fff;}
.chip.bad-chip{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}
.chip.bad-chip:hover{background:var(--red);color:#fff;}
.filter-select{
  width:100%;border:1px solid var(--border);border-radius:var(--radius-xs);
  padding:9px 10px;background:var(--panel-solid);color:var(--text);
  outline:none;font-size:13px;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.filter-select:focus-visible{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.search-box{
  width:100%;border:1px solid var(--border);border-radius:var(--radius-xs);
  padding:9px 12px;background:var(--panel-solid);color:var(--text);
  outline:none;font-size:13px;
  transition:border-color .2s,box-shadow .2s;
}
.search-box:focus-visible{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.search-box::placeholder{color:var(--text-3);}

/* ===== Panel ===== */
.panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:background .4s,border-color .4s,box-shadow .4s;
}
[data-theme="glass"] .panel{
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,.55);
}
[data-theme="glass"] .filter-panel{
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.main-area{display:flex;flex-direction:column;gap:0;}

/* ===== Question Card ===== */
.question-card{padding:28px 30px;min-height:440px;}
.q-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.badge{
  display:inline-flex;align-items:center;padding:6px 14px;border-radius:999px;
  background:var(--accent-light);color:var(--accent);font-weight:700;font-size:12px;
  letter-spacing:.02em;
}
.counter{color:var(--text-3);font-size:13px;font-weight:500;}
.question-text{
  white-space:pre-wrap;line-height:1.9;font-size:17px;font-weight:650;
  padding:22px 24px;border-radius:var(--radius-sm);
  background:var(--q-bg);border:1px solid var(--q-border);
  letter-spacing:.01em;
  transition:background .4s,border-color .4s;
}

/* ===== Options ===== */
.options{display:grid;gap:10px;margin-top:18px;}
.option{
  display:grid;grid-template-columns:44px 1fr;align-items:start;gap:12px;
  width:100%;text-align:left;
  border:1.5px solid var(--border);background:var(--panel-solid);
  border-radius:var(--radius-sm);padding:14px 18px;min-height:58px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
[data-theme="glass"] .option{background:rgba(255,255,255,.65);}
.option::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;border-radius:0 3px 3px 0;
  transition:background .2s ease;
}
.option:hover:not(:disabled){
  transform:translateY(-2px);
  border-color:var(--accent);box-shadow:var(--shadow-sm);
}
.option:hover:not(:disabled)::before{background:var(--accent);}
.option:disabled{cursor:default;opacity:.78;filter:grayscale(.15);}
.option:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.letter{
  width:38px;height:38px;display:inline-grid;place-items:center;
  border-radius:10px;background:var(--q-bg);font-weight:800;
  color:var(--text-2);font-size:15px;flex-shrink:0;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.option-text{white-space:pre-wrap;line-height:1.65;overflow-wrap:anywhere;font-size:15px;align-self:center;}

.option.selected{border-color:var(--accent);background:var(--accent-light);}
.option.selected::before{background:var(--accent);}
.option.selected .letter{background:var(--accent);color:#fff;transform:scale(1.06);box-shadow:0 2px 8px rgba(67,97,238,.3);}
.option.correct{border-color:var(--green-border);background:var(--green-bg);}
.option.correct::before{background:var(--green);}
.option.correct .letter{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.3);}
.option.wrong{border-color:var(--red-border);background:var(--red-bg);}
.option.wrong::before{background:var(--red);}
.option.wrong .letter{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.3);}

/* ===== Result ===== */
.result{
  margin-top:18px;padding:16px 20px;border-radius:var(--radius-sm);
  line-height:1.8;font-size:14px;display:none;
  animation:fadeSlideIn .35s cubic-bezier(.4,0,.2,1);
}
.result.show{display:block;}
.result.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.result.bad{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.result-header{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.result-detail{font-size:13px;opacity:.85;}

/* ===== Fill ===== */
.fill-area{margin-top:18px;display:grid;gap:12px;}
.fill-input{
  width:100%;padding:14px 16px;border:1.5px solid var(--border);
  border-radius:var(--radius-xs);outline:none;
  background:var(--panel-solid);color:var(--text);font-size:15px;
  transition:border-color .2s,box-shadow .2s;
}
.fill-input:focus-visible{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.fill-input:disabled{opacity:.55;}
.fill-input::placeholder{color:var(--text-3);}

/* ===== Buttons ===== */
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;align-items:center;}
.btn{
  border:1.5px solid var(--border);background:var(--panel-solid);color:var(--text);
  border-radius:var(--radius-xs);padding:10px 18px;min-height:42px;
  font-size:13px;font-weight:600;letter-spacing:.01em;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  display:inline-flex;align-items:center;gap:6px;
}
.btn:hover:not(:disabled){
  border-color:var(--accent);background:var(--accent-light);color:var(--accent);
  transform:translateY(-1px);box-shadow:var(--shadow-sm);
}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.btn.primary{
  background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 2px 8px rgba(67,97,238,.25);
}
.btn.primary:hover:not(:disabled){
  background:var(--accent-deep);border-color:var(--accent-deep);
  color:#fff;box-shadow:0 4px 16px rgba(67,97,238,.35);
}
.btn.danger{color:var(--red);}
.btn.danger:hover:not(:disabled){
  background:var(--red-bg);border-color:var(--red-border);color:var(--red);
}

/* ===== Right Panel ===== */
.right-panel{position:sticky;top:20px;display:grid;gap:16px;}
.side-section{padding:18px 20px;}
.side-section h2{
  margin:0 0 14px;font-size:13px;font-weight:700;color:var(--text);
  letter-spacing:.02em;display:flex;align-items:center;gap:8px;
}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stat{
  background:var(--stat-bg);border:1px solid var(--stat-border);
  border-radius:var(--radius-sm);padding:14px 12px;text-align:center;
  transition:background .4s,border-color .4s;
}
.stat b{display:block;font-size:26px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em;}
.stat span{color:var(--text-3);font-size:12px;font-weight:500;}
.progressbar{
  height:8px;border-radius:999px;background:var(--border-light);
  overflow:hidden;margin-top:14px;position:relative;
}
.progressbar>div{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--accent),var(--green));
  border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.progressbar>div::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shimmer 1.8s infinite;
}
.acc-row{display:flex;align-items:baseline;gap:10px;margin-top:12px;justify-content:center;}
.acc-big{font-size:32px;font-weight:800;letter-spacing:-.02em;}
.acc-label{font-size:12px;color:var(--text-3);}

/* ===== Nav Dots ===== */
.nav-list{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;max-height:290px;overflow:auto;padding:2px;}
.nav-dot{
  border:1.5px solid var(--border);background:var(--panel-solid);border-radius:9px;
  min-height:34px;font-size:11px;color:var(--text-2);font-weight:600;
  transition:all .2s ease;
}
.nav-dot:hover:not(.current){border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.nav-dot.current{
  border-color:var(--accent);background:var(--accent-light);color:var(--accent);
  font-weight:800;box-shadow:0 0 0 3px var(--accent-light);
}
.nav-dot.done{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.nav-dot.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}

/* ===== Utilities ===== */
.muted{color:var(--text-3);}
.tiny{font-size:12px;line-height:1.75;}
kbd{
  border:1px solid var(--border);background:var(--kbd-bg);
  border-bottom-width:2px;border-radius:5px;padding:2px 7px;
  font-size:11px;font-weight:600;color:var(--text-2);
  font-family:inherit;
}
.empty{padding:56px 32px;text-align:center;color:var(--text-3);}
.empty h2{margin:0 0 10px;font-size:20px;color:var(--text-2);font-weight:700;}
.credits{
  text-align:center;padding:22px;color:var(--text-3);font-size:12px;
  margin-top:12px;letter-spacing:.02em;
}

/* ===== Checkbox ===== */
.checks{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;font-size:13px;color:var(--text-2);}
.checks label{display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:color .2s;}
.checks label:hover{color:var(--text);}
.checks input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px;}

/* ===== Animations ===== */
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(-8px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes shimmer{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(200%);}
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 0 0 var(--accent);}
  50%{box-shadow:0 0 0 6px transparent;}
}

/* ===== Responsive ===== */
@media(max-width:1150px){
  .three-col{grid-template-columns:1fr;}
  .sidebar,.right-panel{position:static;}
  .sidebar{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
  .right-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
}

"A","text":"安全"},{"label":"B","text":"技术"},{"label":"C","text":"信息化"},{"label":"D","text":"空间"}],"id":73},{"type":"single","question":"网络安全风险得到有效控制，国家网络安全（ ）健全完善，核心技术装备安全可控，网络和信息系统运行稳定可靠。网络安全人才满足需求，全社会的网络安全意识、基本防护技能和利用网络的信心大幅提升。","answer":"A","options":[{"label":"A","text":"保障体系"},{"label":"B","text":"空间体系"},{"label":"C","text":"战略目标"},{"label":"D","text":"信息化体系"}],"id":74},{"type":"single","question":"信息技术标准、政策和市场开放、透明，产品流通和信息传播更加顺畅，数字鸿沟日益弥合。不分大小、强弱、贫富，世界各国特别是（ ）都能分享发展机遇、共享发展成果、公平参与网络空间治理","answer":"B","options":[{"label":"A","text":"发达国家"},{"label":"B","text":"发展中国家"},{"label":"C","text":"开发完国家"},{"label":"D","text":"先进国家"}],"id":75},{"type":"single","question":"防范、制止和依法惩治任何利用网络进行叛国、分裂国家、煽动叛乱、颠覆或者煽动颠覆人民民主专政政权的行为；防范、制止和依法惩治利用网络进行窃取、泄露国家秘密等危害国家安全的行为；防范、制止和依法惩治境外势力利用网络进行渗透、破坏、颠覆、分裂活动。该段话主要说明了（ ）","answer":"B","options":[{"label":"A","text":"坚定捍卫网络空间主权"},{"label":"B","text":"坚决维护国家安全"},{"label":"C","text":"保护关键信息基础设施"},{"label":"D","text":"打击网络恐怖和违法犯罪"}],"id":76},{"type":"single","question":"加强网上（ ）阵地建设，大力培育和践行社会主义核心价值观，实施网络内容建设工程，发展积极向上的网络文化，传播正能量，凝聚强大精神力量，营造良好网络氛围。","answer":"B","options":[{"label":"A","text":"网络空间"},{"label":"B","text":"思想文化"},{"label":"C","text":"信息化"},{"label":"D","text":"网络安全"}],"id":77},{"type":"single","question":"实施网络安全（ ）工程，加强网络安全学科专业建设，打造一流网络安全学院和创新园区，形成有利于人才培养和创新创业的生态环境。办好网络安全宣传周活动，大力开展全民网络安全宣传教育。","answer":"A","options":[{"label":"A","text":"空间"},{"label":"B","text":"技术"},{"label":"C","text":"战略"},{"label":"D","text":"人才"}],"id":78},{"type":"single","question":"人类社会经历了农业革命、工业革命，正在经历（ ）。当前，以信息技术为代表的新一轮科技革命方兴未艾，互联网日益成为创新驱动发展的先导力量。","answer":"B","options":[{"label":"A","text":"网络革命"},{"label":"B","text":"信息革命"},{"label":"C","text":"技术革命"},{"label":"D","text":"科技革命"}],"id":79},{"type":"single","question":"信息技术应用不断深化，（ ）异军突起，经济社会数字化网络化转型步伐加快，网络空间正能量进一步汇聚增强，信息化在现代化建设全局中引领作用日益凸显。","answer":"A","options":[{"label":"A","text":"互联网+"},{"label":"B","text":"互联网"},{"label":"C","text":"数字信息化"},{"label":"D","text":"数字化信息"}],"id":80},{"type":"single","question":"下列哪项不是《网络信息化发展战略纲要》的基本方针（ ）","answer":"C","options":[{"label":"A","text":"创新引领"},{"label":"B","text":"合作共赢"},{"label":"C","text":"网络安全"},{"label":"D","text":"统筹推进"}],"id":81},{"type":"single","question":"泛在先进的（ ）是信息化发展的基石。要加快构建陆地、海洋、天空、太空立体覆盖的国家信息基础设施，不断完善普遍服务，让人们通过网络了解世界、掌握信息、摆脱贫困、改善生活、享有幸福。","answer":"A","options":[{"label":"A","text":"基础设施"},{"label":"B","text":"关键基础设施"},{"label":"C","text":"核心基础设施"},{"label":"D","text":"核心关键基础设施"}],"id":82},{"type":"single","question":"科学灵活选择接入技术，分类推进农村网络覆盖。发达地区优先推进光纤到村。边远地区、林牧区、海岛等区域根据条件采用移动蜂窝、卫星通信等多种方式实现覆盖。居住分散、位置偏远、地理条件恶劣的地区可结合人口搬迁、集中安置实现网络接入。完善电信普遍服务补偿机制，建立支持农村和中西部地区宽带网络发展长效机制，推进网络提速降费，为社会困难群体运用网络创造条件。这段话主要说明了（ ）","answer":"A","options":[{"label":"A","text":"提高普遍服务水平"},{"label":"B","text":"增强空间设施能力"},{"label":"C","text":"优化升级宽带网络"},{"label":"D","text":"统筹规划基础设施布局"}],"id":83},{"type":"single","question":"人才资源是第一资源，（ ）是最终的竞争。要完善人才培养、选拔、使用、评价、激励机制，破除壁垒，聚天下英才而用之，为网信事业发展提供有力人才支撑。","answer":"D","options":[{"label":"A","text":"技术竞争"},{"label":"B","text":"信息资源竞争"},{"label":"C","text":"科学竞争"},{"label":"D","text":"人才竞争"}],"id":84},{"type":"single","question":"托国家重大人才工程，加大对信息化领军人才支持力度，培养造就世界水平的科学家、网络科技领军人才、卓越工程师、高水平创新团队和信息化管理人才。吸引和扶持海外高层次人才回国创新创业，建立海外人才特聘专家制度，对需要引进的特殊人才，降低永久居留权门槛，探索建立技术移民制度，提高我国在全球配置人才资源能力。这段话主要说明了（ ）","answer":"A","options":[{"label":"A","text":"造就一批领军人才"},{"label":"B","text":"壮大专业人才队伍"},{"label":"C","text":"完善人才激励机制"},{"label":"D","text":"提升国民信息技能"}],"id":85},{"type":"single","question":"加强网络文化阵地建设，我们不需要做的是（ ）","answer":"D","options":[{"label":"A","text":"做大做强中央主要新闻网站和地方重点新闻网站，规范引导商业网站健康有序发展。推进重点新闻网站体制机制创新。"},{"label":"B","text":"鼓励优秀互联网企业和文化企业强强联合，培育一批具有国际影响力的新型文化集团、媒体集团"},{"label":"C","text":"推进重点新闻网站体制机制创新"},{"label":"D","text":"引导社会力量积极开发适合网络传播特点、满足人们多样化需求的网络文化产品。"}],"id":86},{"type":"single","question":"依法推进信息化、维护网络安全是全面依法治国的重要内容。要以网络空间（ ）为重点，发挥立法的引领和推动作用，加强执法能力建设，提高全社会自觉守法意识，营造良好的信息化法治环境。","answer":"C","options":[{"label":"A","text":"信息化"},{"label":"B","text":"网络化"},{"label":"C","text":"法治化"},{"label":"D","text":"数字化"}],"id":87},{"type":"single","question":"加快信息强军，构建现代军事力量体系，我们不需要做的是（ ）","answer":"D","options":[{"label":"A","text":"加强体系化建设"},{"label":"B","text":"提高实战化训练水平"},{"label":"C","text":"深化军事斗争准备"},{"label":"D","text":"完善信息化法律框架"}],"id":88},{"type":"single","question":"网络空间是亿万民众共同的（ ）。网络空间天朗气清、生态良好，符合人民利益。","answer":"C","options":[{"label":"A","text":"精神寄托"},{"label":"B","text":"精神需求"},{"label":"C","text":"精神家园"},{"label":"D","text":"精神乐园"}],"id":89},{"type":"single","question":"树立正确的网络（ ），坚持积极防御、有效应对，增强网络安全防御能力和威慑能力，切实维护国家网络空间主权、安全、发展利益。","answer":"B","options":[{"label":"A","text":"价值观"},{"label":"B","text":"安全观"},{"label":"C","text":"事业观"},{"label":"D","text":"技术观"}],"id":90},{"type":"single","question":"维护（ ）和国家安全。依法管理我国主权范围内的网络活动，坚定捍卫我国网络主权。坚决防范和打击通过网络分裂国家、煽动叛乱、颠覆政权、破坏统一、窃密泄密等行为。","answer":"A","options":[{"label":"A","text":"网络主权"},{"label":"B","text":"网络安全"},{"label":"C","text":"网络空间"},{"label":"D","text":"核心技术"}],"id":91},{"type":"single","question":"中央网络安全和信息化领导小组的组长是（ ）","answer":"A","options":[{"label":"A","text":"习近平"},{"label":"B","text":"李克强"},{"label":"C","text":"刘云山"},{"label":"D","text":"周小川"}],"id":92},{"type":"single","question":"《网络安全法》是以第（ ）号主席令的方式发布的","answer":"D","options":[{"label":"A","text":"三十四"},{"label":"B","text":"四十二"},{"label":"C","text":"四十三"},{"label":"D","text":"五十三"}],"id":93},{"type":"single","question":"关键信息基础设施的运营者采购网络产品和服务，可能影响（ ）的，应当通过国家网信部门会同国务院有关部门组织的国家安全审查。","answer":"C","options":[{"label":"A","text":"政府安全"},{"label":"B","text":"信息安全"},{"label":"C","text":"国家安全"},{"label":"D","text":"网络安全"}],"id":94},{"type":"single","question":"全国网络安全和信息化工作会议20日至21日在北京召开。中共中央总书记、国家主席、中央军委主席、中央网络安全和信息化委员会主任习近平出席会议并发表重要讲话。他强调，为中华民族带来了千载难逢的机遇。（ ）","answer":"A","options":[{"label":"A","text":"信息化"},{"label":"B","text":"网络化"},{"label":"C","text":"信息安全"},{"label":"D","text":"网络安全"}],"id":95},{"type":"single","question":"2016年4月19日,习近平总书记在网络安全和信息化工作座谈会上指出,维护网络安全,首先要知道风险在哪里,是什么样的风险,什么时候发生风险,正所谓\"聪者听于无声,明者见于未形\"。（ ）是最基本最基础的工作。","answer":"A","options":[{"label":"A","text":"感知网络安全态势"},{"label":"B","text":"实施风险评估"},{"label":"C","text":"加强安全策略"},{"label":"D","text":"实行总体防御"}],"id":96},{"type":"single","question":"国家坚持网络安全与信息化发展并重，遵循（ ）的方针，推进网络基础设施建设和互联互通，鼓励网络技术创新和应用，支持培养网络安全人才，建立健全网络安全保障体系，提高网络安全保护能力。","answer":"D","options":[{"label":"A","text":"网络安全等级保护制度"},{"label":"B","text":"网络实名制"},{"label":"C","text":"同步规划、同步建设、同步使用"},{"label":"D","text":"积极利用、科学发展、依法管理、确保安全"}],"id":97},{"type":"single","question":"国家倡导诚实守信、（ ）的网络行为，推动传播社会主义核心价值观，采取措施提高全社会的网络安全意识和水平，形成全社会共同参与促进网络安全的良好环境。","answer":"C","options":[{"label":"A","text":"自由平等"},{"label":"B","text":"团结互助"},{"label":"C","text":"健康文明"},{"label":"D","text":"和平友爱"}],"id":98},{"type":"single","question":"（ ）是亿万民众共同的精神家园。（ ）天朗气清、生态良好，符合人民利益。（ ）乌烟瘴气、生态恶化，不符合人民利益。","answer":"C","options":[{"label":"A","text":"网络安全"},{"label":"B","text":"信息安全"},{"label":"C","text":"网络空间"},{"label":"D","text":"技术人员"}],"id":99},{"type":"single","question":"在以下标准中，属于推荐性国家标准的是？（ ）","answer":"A","options":[{"label":"A","text":"GB/TXXXX.X-200X"},{"label":"B","text":"GBXXXX-200X"},{"label":"C","text":"DBXX/TXXX-200X"},{"label":"D","text":"GB/ZXXX-XXX-200X"}],"id":100},{"type":"single","question":"信息系统安全保护等级为3级的系统，应当（ ）年进行一次等级测评?","answer":"B","options":[{"label":"A","text":"0.5"},{"label":"B","text":"1"},{"label":"C","text":"2"},{"label":"D","text":"3"}],"id":101},{"type":"single","question":"侵入国家事务、国防建设、尖端科学技术领域的计算机信息系统将被追究（ ）","answer":"B","options":[{"label":"A","text":"民事责任"},{"label":"B","text":"刑事责任"},{"label":"C","text":"行政责任"},{"label":"D","text":"不追究责任"}],"id":102},{"type":"single","question":"国家信息安全等级保护坚持（ ）的原则。","answer":"B","options":[{"label":"A","text":"自主定级自主创新"},{"label":"B","text":"自主定级自主保护"},{"label":"C","text":"自主评测自主备案"},{"label":"D","text":"公安定级公安备案"}],"id":103},{"type":"single","question":"信息系统安全等级保护分为（ ）级","answer":"C","options":[{"label":"A","text":"三级"},{"label":"B","text":"四级"},{"label":"C","text":"五级"},{"label":"D","text":"六级"}],"id":104},{"type":"single","question":"第五级信息系统应当依据（ ）需求进行自查。","answer":"D","options":[{"label":"A","text":"每月"},{"label":"B","text":"每季度"},{"label":"C","text":"每半年"},{"label":"D","text":"特殊安全"}],"id":105},{"type":"single","question":"已运营（运行）的第二级以上信息系统，应当在安全保护等级确定后（ ）日内，由其运营、使用单位到所在地设区的市级以上公安机关办理备案手续。","answer":"C","options":[{"label":"A","text":"10"},{"label":"B","text":"20"},{"label":"C","text":"30"},{"label":"D","text":"40"}],"id":106},{"type":"single","question":"利用互联网实施违法行为，违反社会治安管理，尚不构成犯罪的，由公安机关依照《》予以处罚（ ）","answer":"B","options":[{"label":"A","text":"《信息安全系统等级保护管理办法》"},{"label":"B","text":"《治安管理处罚条例》"},{"label":"C","text":"《中华人民共和国计算机系统保护条例》"},{"label":"D","text":"《刑法》"}],"id":107},{"type":"single","question":"利用互联网侵犯他人合法权益，构成民事侵权的，依法承担（ ）","answer":"A","options":[{"label":"A","text":"民事责任"},{"label":"B","text":"刑事责任"},{"label":"C","text":"处分"},{"label":"D","text":"罚款"}],"id":108},{"type":"single","question":"国家采取措施，监测、防御、处置来源于中华人民共和国境内外的网络安全风险和威胁，保护关键信息基础设施免受攻击、（ ）、干扰和破坏，依法惩治网络违法犯罪活动，维护网络空间安全和秩序。","answer":"B","options":[{"label":"A","text":"检测"},{"label":"B","text":"侵入"},{"label":"C","text":"扫描"},{"label":"D","text":"监督"}],"id":109},{"type":"single","question":"为防范网络欺诈确保交易安全，网银系统首先要求用户安全登录，然后使用“智能卡+短信认证”模式进行网上转账等交易，在此场景中用到下列哪些鉴别方法?（ ）","answer":"A","options":[{"label":"A","text":"实体“所知”以及实体“所有”的鉴别方法"},{"label":"B","text":"实体“所有”以及实体“特征”的鉴别方法"},{"label":"C","text":"实体“所知”以及实体“特征”的鉴别方法"},{"label":"D","text":"实体“所有”以及实体“行为”的鉴别方法"}],"id":110},{"type":"single","question":"以下关于信息安全工程说法正确的是（ ）","answer":"C","options":[{"label":"A","text":"信息化建设中系统功能的实现是最重要的"},{"label":"B","text":"信息化建设可以实施系统，而后对系统进行安全加固"},{"label":"C","text":"信息化建设中在规划阶段合理规划信息安全，在建设阶段要同步实施信息安全建设"},{"label":"D","text":"信息化建设没有必要涉及信息安全建设"}],"id":111},{"type":"single","question":"信息安全是国家安全的重要组成部分，综合研究当前世界各国信息安全保障工作，下面总结错误的是（ ）","answer":"C","options":[{"label":"A","text":"各国普遍将与国家安全、社会稳定和民生密切相关的关键基础设施作为信息安全保障的重点"},{"label":"B","text":"各国普遍重视战略规划工作，逐步发布网络安全战略、政策评估报告、推进计划等文件"},{"label":"C","text":"各国普遍加强国际交流与对话，均同意建立一致的安全保障系统，强化各国安全系统互通"},{"label":"D","text":"各国普遍积极推动信息安全立法和标准规范建设，重视应急响应、安全监管和安全测评"}],"id":112},{"type":"single","question":"身份认证也称为“身份验证”或“身份鉴别”，是指在计算机及计算机网络系统中确认操作者身份的过程，从而确定该用户是否具有对某种资源的访问和使用权限，在真实世界，对用户的身份认证基本方法可以分为三种基本的鉴别方式:你知道什么，你有什么，以及（ ）：","answer":"D","options":[{"label":"A","text":"你做什么"},{"label":"B","text":"你需要什么"},{"label":"C","text":"你看到什么"},{"label":"D","text":"你是什么"}],"id":113},{"type":"single","question":"1996年上海某寻呼台发生的逻辑炸弹事件，造事者被判\"情节轻微，无罪释放\"是因为（ ）","answer":"B","options":[{"label":"A","text":"证据不足"},{"label":"B","text":"法律不健全"},{"label":"C","text":"没有造成破坏"},{"label":"D","text":"撤诉"}],"id":114},{"type":"single","question":"以下人员中，谁负有决定信息分类级别的责任？（ ）","answer":"C","options":[{"label":"A","text":"审计员"},{"label":"B","text":"用户"},{"label":"C","text":"数据所有者"},{"label":"D","text":"安全员"}],"id":115},{"type":"single","question":"下面不属于身份认证的主要技术的是（ ）","answer":"D","options":[{"label":"A","text":"零知识证明"},{"label":"B","text":"生理特征识别"},{"label":"C","text":"磁卡和智能卡"},{"label":"D","text":"数据加密"}],"id":116},{"type":"single","question":"拒绝服务攻击损害了信息系统的（ ）。","answer":"D","options":[{"label":"A","text":"可靠性"},{"label":"B","text":"完整性"},{"label":"C","text":"保密性"},{"label":"D","text":"可用性"}],"id":117},{"type":"single","question":"网络产品、服务具有收集用户信息功能的，其提供者应当（ ）。","answer":"C","options":[{"label":"A","text":"不需要向用户明示但需要取得同意"},{"label":"B","text":"向用户明示但不需要同意"},{"label":"C","text":"向用户明示并取得同意"},{"label":"D","text":"不需要向用户明示也不需要取得同意"}],"id":118},{"type":"single","question":"（ ）建立网络安全监测预警和信息通报制度。","answer":"B","options":[{"label":"A","text":"国家网信部门"},{"label":"B","text":"国家"},{"label":"C","text":"网络运营者"},{"label":"D","text":"个人"}],"id":119},{"type":"single","question":"违反《中华人民共和国网络安全法》规定，给他人造成损害的，依法承担（ ）","answer":"B","options":[{"label":"A","text":"行政责任"},{"label":"B","text":"民事责任"},{"label":"C","text":"刑事责任"},{"label":"D","text":"罚款"}],"id":120},{"type":"single","question":"《网络安全法》规定，各级人民政府及其有关部门应当组织开展经常性的网络安全宣传教育，并（ ）有关单位做好网络安全宣传教育工作。","answer":"B","options":[{"label":"A","text":"鼓励、引导"},{"label":"B","text":"指导、督促"},{"label":"C","text":"支持、指导"},{"label":"D","text":"支持、引导"}],"id":121},{"type":"single","question":"开展网络安全认证、检测、风险评估等活动，向社会发布系统漏洞、计算机病毒、网络攻击、网络侵入等网络（ ），应当遵守国家有关规定。","answer":"A","options":[{"label":"A","text":"安全信息"},{"label":"B","text":"信息"},{"label":"C","text":"预警"},{"label":"D","text":"连接"}],"id":122},{"type":"single","question":"网络产品、服务应当符合相关国家标准的（ ）","answer":"B","options":[{"label":"A","text":"一般性要求"},{"label":"B","text":"强制性要求"},{"label":"C","text":"建议性要求"},{"label":"D","text":"适当性要求"}],"id":123},{"type":"single","question":"故意制作、传播计算机病毒等破坏性程序，影响计算机系统正常运行，后果严重的，将受到____处罚（ ）","answer":"A","options":[{"label":"A","text":"处五年以下有期徒刑或者拘役"},{"label":"B","text":"拘留"},{"label":"C","text":"罚款"},{"label":"D","text":"警告"}],"id":124},{"type":"single","question":"编造恐怖信息,传播或者放任传播,严重扰乱社会秩序的,依照刑法第291条之一的规定,应认定为（ ）","answer":"C","options":[{"label":"A","text":"恐吓罪"},{"label":"B","text":"诈骗罪"},{"label":"C","text":"编造虚假恐怖信息罪"},{"label":"D","text":"不是犯罪"}],"id":125},{"type":"single","question":"2005年4月1日正式施行的《电子签名法》，被称为“中国首部真正意义上的信息化法律”，自此电子签名与传统手写签名和盖章具有同等的法律效力。以下关于电子签名说法错误的是：（ ）","answer":"D","options":[{"label":"A","text":"电子签名——是指数据电文中以电子形式所含、所附用于识别签名人身份并表明签名人认可其中内容的数据"},{"label":"B","text":"电子签名适用于民事活动中的合同或者其他文件、单证等文书"},{"label":"C","text":"电子签名需要第三方认证的，由依法设立的电子认证服务提供者提供认证服务"},{"label":"D","text":"电子签名制作数据用于电子签名时，属于电子签名人和电子认证服务提供者共有"}],"id":126},{"type":"single","question":"自2004年1月起，国内各有关部门在申报信息安全国家标准计划项目时，必须经由以下哪个组织提出工作意见，协调一致后由该组织申报。（ ）","answer":"B","options":[{"label":"A","text":"全国通信标准化技术委员会(TC485)"},{"label":"B","text":"全国信息安全标准化技术委员会(TC260)"},{"label":"C","text":"中国通信标准化协会(CCSA)"},{"label":"D","text":"网络与信息安全技术工作委员会"}],"id":127},{"type":"single","question":"在信息安全事件中，（ ）是因为管理不善造成的。","answer":"D","options":[{"label":"A","text":"0.5"},{"label":"B","text":"0.6"},{"label":"C","text":"0.7"},{"label":"D","text":"0.8"}],"id":128},{"type":"single","question":"为了保障网络安全，维护网络空间主权和国家安全、________，保护公民、法人和其他组织的合法权益，促进经济社会信息化健康发展，制定《网络安全法》（ ）","answer":"B","options":[{"label":"A","text":"国家利益"},{"label":"B","text":"社会公共利益"},{"label":"C","text":"私人企业利益"},{"label":"D","text":"国有企事业单位利益"}],"id":129},{"type":"single","question":"国家网信部门负责统筹协调网络安全工作和相关监督管理工作。国务院电信主管部门、公安部门和其他有关机关依照本法和有关法律、行政法规的规定，在各自职责范围内负责（ ）和监督管理工作。","answer":"D","options":[{"label":"A","text":"网络安全"},{"label":"B","text":"设备安全"},{"label":"C","text":"信息安全"},{"label":"D","text":"网络安全保护"}],"id":130},{"type":"single","question":"网络运营者开展经营和服务活动，必须遵守法律、行政法规，尊重社会公德，遵守商业道德，（ ），履行网络安全保护义务，接受政府和社会的监督，承担社会责任。","answer":"A","options":[{"label":"A","text":"诚实信用"},{"label":"B","text":"诚实"},{"label":"C","text":"守信"},{"label":"D","text":"守道德"}],"id":131},{"type":"single","question":"国家推进网络安全社会化服务体系建设，鼓励有关企业、机构开展网络安全认证、检测和（ ）等安全服务。","answer":"C","options":[{"label":"A","text":"安全认证"},{"label":"B","text":"检测"},{"label":"C","text":"风险评估"},{"label":"D","text":"预防"}],"id":132},{"type":"single","question":"省级以上人民政府有关部门在履行网络安全监督管理职责中，发现网络存在较大（ ）或者发生安全事件的，可以按照规定的权限和程序对该网络的运营者的法定代表人或者主要负责人进行约谈。网络运营者应当按照要求采取措施，进行整改，消除隐患。","answer":"C","options":[{"label":"A","text":"安全责任"},{"label":"B","text":"安全事件"},{"label":"C","text":"安全风险"},{"label":"D","text":"保密"}],"id":133},{"type":"single","question":"任何个人和组织发送的电子信息、提供的应用软件，不得设置（ ），不得含有法律、行政法规禁止发布或者传输的信息。","answer":"B","options":[{"label":"A","text":"软件"},{"label":"B","text":"恶意程序"},{"label":"C","text":"木马"},{"label":"D","text":"病毒"}],"id":134},{"type":"single","question":"负责关键信息基础设施安全保护工作的部门，应当建立健全本行业、本领域的网络安全（ ）和信息通报制度，并按照规定报送网络安全监测预警信息。","answer":"B","options":[{"label":"A","text":"检测监测"},{"label":"B","text":"监测预警"},{"label":"C","text":"检测预警"},{"label":"D","text":"监测与检测预警"}],"id":135},{"type":"single","question":"网络相关行业组织按照章程，加强行业自律，（ ），指导会员加强网络安全保护，提高网络安全保护水平，促进行业健康发展。","answer":"B","options":[{"label":"A","text":"安全准则"},{"label":"B","text":"网络安全风险"},{"label":"C","text":"信息安全风险"},{"label":"D","text":"风险"}],"id":136},{"type":"single","question":"任何个人和组织不得窃取或者以其他非法方式获取个人信息，不得（ ）或者非法向他人提供个人信息。","answer":"C","options":[{"label":"A","text":" 列选项，存在安全风险的行为是（ ）","answer":"B","options":[{"label":"A","text":"将电脑开机密码设置成复杂的15位强密码"},{"label":"B","text":"安装盗版的操作系统"},{"label":"C","text":"在QQ聊天过程中不点击任何不明链接"},{"label":"D","text":"避免在不同网站使用相同的用户名和口令"}],"id":172},{"type":"single","question":"互联网世界中有一个著名的说法：“你永远不知道网络的对面是一个人还是一个机器!”，这段话表明，网络安全中（ ）","answer":"A","options":[{"label":"A","text":"身份认证的重要性和迫切性"},{"label":"B","text":"网络上所有的活动都是不可见的"},{"label":"C","text":"网络应用中存在不严肃性"},{"label":"D","text":"计算机网络中不存在真实信息"}],"id":173},{"type":"single","question":"大学生小吴在网上以一个知名作家的名义写博客，但事先没有征得该作家同意。小吴应当承担（ ）","answer":"A","options":[{"label":"A","text":"侵权责任"},{"label":"B","text":"违约责任"},{"label":"C","text":"刑事责任"},{"label":"D","text":"行政责任"}],"id":174},{"type":"single","question":"企业重要数据要及时进行（ ），以防出现意外情况导致数据丢失","answer":"C","options":[{"label":"A","text":"杀毒"},{"label":"B","text":"加密"},{"label":"C","text":"备份"},{"label":"D","text":"更新"}],"id":175},{"type":"single","question":"当Windows系统出现某些错误而不能正常启动或运行时，为了提高系统自身的安全性，在启动时可以进入（ ）模式","answer":"B","options":[{"label":"A","text":"异常"},{"label":"B","text":"安全"},{"label":"C","text":"命令提示符"},{"label":"D","text":"单步启动"}],"id":176},{"type":"single","question":"好友的QQ突然发来一个网站链接要求投票，最合理的做法是（ ）","answer":"B","options":[{"label":"A","text":"因为是其好友信息，直接打开链接投票"},{"label":"B","text":"可能是好友QQ被盗，发来的是恶意链接，先通过手机跟朋友确认链接无异常后，再酌情考虑是否投票"},{"label":"C","text":"不参与任何投票"},{"label":"D","text":"把好友加入黑名单"}],"id":177},{"type":"single","question":"李同学浏览网页时弹出“新版游戏，免费玩，点击就送大礼包”的广告，李同学点了之后发现是个网页游戏，提示：“请安装插件”，这种情况李同学应该怎么办最合适（ ）","answer":"B","options":[{"label":"A","text":"为了领取大礼包，安装插件之后玩游戏"},{"label":"B","text":"网页游戏一般是不需要安装插件的，这种情况骗局的可能性非常大，不建议打开"},{"label":"C","text":"询问朋友是否玩过这个游戏，朋友如果说玩过，那应该没事。"},{"label":"D","text":"先将操作系统做备份，如果安装插件之后有异常，大不了恢复系统"}],"id":178},{"type":"single","question":"李某将同学张某的小说擅自发表在网络上,该行为（ ）","answer":"B","options":[{"label":"A","text":"不影响张某在出版社出版该小说,因此合法"},{"label":"B","text":"侵犯了张某的著作权"},{"label":"C","text":"并未给张某造成直接财产损失,因此合法"},{"label":"D","text":"扩大了张某的知名度,应该鼓励"}],"id":179},{"type":"single","question":"下列有关网络安全的表述，正确的是（ ）","answer":"D","options":[{"label":"A","text":"只要装了杀毒软件，网络就是安全的"},{"label":"B","text":"只要装了防火墙，网络就是安全的"},{"label":"C","text":"只要设定了密码，网络就是安全的"},{"label":"D","text":"尚没有绝对安全的网络，网民要注意保护个人信息"}],"id":180},{"type":"single","question":"将个人电脑送修时，最好取下哪种电脑部件（ ）","answer":"C","options":[{"label":"A","text":"CPU"},{"label":"B","text":"内存"},{"label":"C","text":"硬盘"},{"label":"D","text":"显卡"}],"id":181},{"type":"single","question":"以下能有效减少无线网络的安全风险，避免个人隐私信息被窃取的措施有（ ）","answer":"A","options":[{"label":"A","text":"使用WPA等加密的网络"},{"label":"B","text":"无需维护和升级杀毒软件"},{"label":"C","text":"可以让陌生用户接入"},{"label":"D","text":"关闭防火墙"}],"id":182},{"type":"single","question":"计算机病毒是计算机系统中一类隐藏在（ ）上蓄意破坏的捣乱程序。","answer":"C","options":[{"label":"A","text":"内存"},{"label":"B","text":"U盘"},{"label":"C","text":"存储介质"},{"label":"D","text":"网络"}],"id":183},{"type":"single","question":"通常意义上的网络黑客是指通过互联网并利用非正常手段（ ）","answer":"B","options":[{"label":"A","text":"上网的人"},{"label":"B","text":"入侵他人计算机系统的人"},{"label":"C","text":"网络上行骗的人"},{"label":"D","text":"在网络上卖东西的人"}],"id":184},{"type":"single","question":"我们经常从网站上下载文件、软件，为了确保系统安全，以下哪个处理措施最正确（ ）","answer":"B","options":[{"label":"A","text":"直接打开或使用"},{"label":"B","text":"先查杀病毒，再使用"},{"label":"C","text":"习惯于下载完成自动安装"},{"label":"D","text":"下载之后先做操作系统备份，如有异常恢复系统"}],"id":185},{"type":"single","question":"防火墙用于将互联网和内部网络隔离，（ ）","answer":"B","options":[{"label":"A","text":"是防止Internet火灾的硬件设施"},{"label":"B","text":"是网络安全和信息安全的软件和硬件设施"},{"label":"C","text":"是保护线路不受破坏的软件和硬件设施"},{"label":"D","text":"是起抗电磁干扰作用的硬件设施"}],"id":186},{"type":"single","question":"互联网安全除了电脑以外，还包括（ ）","answer":"D","options":[{"label":"A","text":"服务器"},{"label":"B","text":"网络电视"},{"label":"C","text":"游戏机"},{"label":"D","text":"手机"}],"id":187},{"type":"single","question":"下列不属于计算机病毒防治的策略的是（ ）","answer":"C","options":[{"label":"A","text":"及时升级反病毒产品"},{"label":"B","text":"对新购置计算机进行病毒检测"},{"label":"C","text":"整理系统磁盘"},{"label":"D","text":"常备一张真正“干净”的引导盘"}],"id": text":"日本"},{"label":"D","text":"韩国"}],"id":249},{"type":"single","question":"5G的超低时延是多少（ ）","answer":"A","options":[{"label":"A","text":"1ms"},{"label":"B","text":"2ms"},{"label":"C","text":"5ms"},{"label":"D","text":"10ms"}],"id":250},{"type":"single","question":"5G目前主要的应用集中在（ ）","answer":"A","options":[{"label":"A","text":"eMBB"},{"label":"B","text":"mMTC"},{"label":"C","text":"uRLLC"},{"label":"D","text":"终端"}],"id":251},{"type":"single","question":"2020年中国预计建设（ ）个5G基站","answer":"C","options":[{"label":"A","text":"25万"},{"label":"B","text":"35万"},{"label":"C","text":"55万"},{"label":"D","text":"30万"}],"id":252},{"type":"single","question":"全球5G商用元年是哪一年？（ ）","answer":"B","options":[{"label":"A","text":"2018"},{"label":"B","text":"2019"},{"label":"C","text":"2020"},{"label":"D","text":"2021"}],"id":253},{"type":"single","question":"智能抄表业务，除了需要用到连接数增大技术之外，还需要什么技术支撑？（ ）","answer":"B","options":[{"label":"A","text":"速率提升技术"},{"label":"B","text":"时延降低技术"},{"label":"C","text":"覆盖增强技术"},{"label":"D","text":"移动性能增强"}],"id":254},{"type":"single","question":"以下哪些是5G的应用案例？（ ）","answer":"A","options":[{"label":"A","text":"不支持5G的手机"},{"label":"B","text":"基于5G网络的VR/4K/8K直播"},{"label":"C","text":"远程/自动车辆驾驶"},{"label":"D","text":"基于5G的AGV管理"}],"id":255},{"type":"single","question":"下面哪项不是5G关键技术（ ）","answer":"A","options":[{"label":"A","text":"0.1倍空口时延"},{"label":"B","text":"多天线"},{"label":"C","text":"高阶调制"},{"label":"D","text":"10倍流量密度"}],"id":256},{"type":"single","question":"以下哪一项是对信息系统经常不能满足用户需求的最好解释：（ ）","answer":"B","options":[{"label":"A","text":"没有适当的质量管理工具"},{"label":"B","text":"经常变化的用户需求"},{"label":"C","text":"用户参与需求挖掘不够"},{"label":"D","text":"项目管理能力不强"}],"id":257},{"type":"single","question":"伴随信息革命的飞速发展，互联网、通信网、计算机系统、自动化控制系统、数字设备及其承载的应用、服务和数据等组成的（ ），正在全面改变人们的生产生活方式，深刻影响人类社会历史发展进程。","answer":"A","options":[{"label":"A","text":"网络空间"},{"label":"B","text":"网络安全"},{"label":"C","text":"网络系统"},{"label":"D","text":"网络架构"}],"id":258},{"type":"single","question":"一个安全（ ）的网络空间，对各国乃至世界都具有重大意义。中国愿与各国一道，加强沟通、扩大共识、深化合作，积极推进全球互联网治理体系变革，共同维护网络空间和平安全。","answer":"A","options":[{"label":"A","text":"稳定繁荣"},{"label":"B","text":"繁荣"},{"label":"C","text":"稳定"},{"label":"D","text":"繁荣稳定"}],"id":259},{"type":"single","question":"根据宪法和法律法规管理我国主权范围内的网络活动，保护我国信息设施和信息资源安全，采取包括经济、行政、科技、法律、外交、军事等一切措施，坚定不移地维护我国（ ）主权","answer":"A","options":[{"label":"A","text":"网络空间"},{"label":"B","text":"网络安全"},{"label":"C","text":"网络体系"},{"label":"D","text":"网络信息化"}],"id":260},{"type":"single","question":"坚决打击谣言、淫秽、暴力、迷信、邪教等违法有害信息在网络空间传播蔓延。提高青少年网络文明素养，加强对未成年人上网保护，通过政府、社会组织、社区、学校、家庭等方面的共同努力，为（ ）健康成长创造良好的网络环境。","answer":"D","options":[{"label":"A","text":"全体网民"},{"label":"B","text":"青少年"},{"label":"C","text":"中老年"},{"label":"D","text":"未成年"}],"id":261},{"type":"multi","question":"关于XSS跨站脚本攻击，下列说法正确的有（ ）","answer":"ABCD","options":[{"label":"A","text":"XSS（crosssitescripting）跨站脚本，是一种迫使Web站点回显可执行代码的攻击技术，而这些可执行代码由攻击者提供、最终为用户浏览器加载。"},{"label":"B","text":"XSS攻击，一共涉及到三方，即攻击者、客户端与网站。"},{"label":"C","text":"XSS攻击，最常用的攻击方式就是通过脚本盗取用户端cookie，从而进一步进行攻击。"},{"label":"D","text":"跨站脚本攻击，分为反射型和存储型两种类型。"}],"id":262},{"type":"multi","question":"选出可以被暴力破解的协议（ ）","answer":"ABC","options":[{"label":"A","text":"POP3"},{"label":"B","text":"SNMP"},{"label":"C","text":"FTP"},{"label":"D","text":"TFTP"}],"id":263},{"type":"multi","question":"下列关于计算机取证理念阐述争取的是（ ）","answer":"ABCD","options":[{"label":"A","text":"在不对原来物证进行任何改动或损坏的前提下获取证据"},{"label":"B","text":"证明你所获取的证据和原有的数据是相同的"},{"label":"C","text":"在不改动数据的前提下对其进行分析"},{"label":"D","text":"务必确认你已经完整地记录下你采取的每一个步骤以及采取该步骤的原因"}],"id":264},{"type":"judge","question":"计算机取证是指运用计算机辨析技术，对计算机犯罪行为进行分析以确认犯罪及计算机证据，并据此提起诉讼。也就是针对计算机入侵与犯罪，进行证据获取、保存、分析和出示","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":265},{"type":"judge","question":"调查取证遵循一个原则：优先收集易变信息，其次收集不易变信息。易变信息存在于运行系统的内存中，不易变信息存在于系统磁盘中","answer":"A","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":266},{"type":"judge","question":"MD5是一个典型的Hash算法，其输出的摘要值的长度可以是128位，也可以是160位。","answer":"B","options":[{"label":"A","text":"对"},{"label":"B","text":"错"}],"id":267},{"type":"single","question":"在相互尊重、相互信任的基础上，加强国际网络空间对话合作，推动互联网全球治理体系变革。深化同各国的双边、多边网络安全对话交流和信息沟通，有效管控分歧，积极参与全球和区域组织网络安全合作，推动互联网地址、根域名服务器等基础资源管理国际化。这段话主要说明了（ ）","answer":"D","options":[{"label":"A","text":"完善网络治理体系"},{"label":"B","text":"夯实网络安全基础"},{"label":"C","text":"提升网络空间防护能力"},{"label":"D","text":"强化网络空间国际合作"}],"id":268},{"type":"single","question":"目前，我国网民数量、网络零售交易额、电子信息产品制造规模已居全球第一，一批信息技术企业和互联网企业进入世界前列，形成了较为完善的（ ）产业体系。","answer":"C","options":[{"label":"A","text":"安全"},{"label":"B","text":"空间"},{"label":"C","text":"信息"},{"label":"D","text":"网络"}],"id":269},{"type":"single","question":"到2020年，固定宽带家庭普及率达到（ ）水平，第三代移动通信（3G）、第四代移动通信（4G）网络覆盖城乡，第五代移动通信（5G）技术研发和标准取得突破性进展。","answer":"B","options":[{"label":"A","text":"先进发达国家"},{"label":"B","text":"中等发达国家"},{"label":"C","text":"中等发展中国家"},{"label":"D","text":"先进发展中国家"}],"id":270},{"type":"single","question":"网络安全和信息化是一体之两翼、驱动之双轮，必须统一谋划、统一部署、统一推进、统一实施，做到协调一致、齐头并进；切实防范、控制和化解信息化进程中可能产生的风险，以安全保发展，以发展促安全，努力建久安之势、成长治之业。这段话指的是哪项基本方针（ ）","answer":"D","options":[{"label":"A","text":"创新引领"},{"label":"B","text":"确保安全"},{"label":"C","text":"惠及民生"},{"label":"D","text":"网络安全"}],"id":271},{"type":"single","question":"深化电信业改革，鼓励多种所有制企业有序参与竞争。统筹国家现代化建设需求，实现信息基础设施共建共享，推进区域和城乡协调发展。协调频谱资源配置，科学规划无线电频谱，提升资源利用效率。加强信息基础设施与市政、公路、铁路、机场等规划建设的衔接。支持港澳地区完善信息基础设施布局。这段话主要说明了（ ）","answer":"D","options":[{"label":"A","text":"提高普遍服务水平"},{"label":"B","text":"增强空间设施能力"},{"label":"C","text":"优化升级宽带网络"},{"label":"D","text":"统筹规划基础设施布局"}],"id":272},{"type":"single","question":"下列不属于提升网络文化供给能力的措施的是（ ）","answer":"D","options":[{"label":"A","text":"实施网络内容建设工程"},{"label":"B","text":"加快文化资源数字化建设，提高网络文化生产的规模化、专业化水平"},{"label":"C","text":"整合公共文化资源，构建公共文化服务体系，提升信息服务水平"},{"label":"D","text":"完善网络文化传播机制，构建现代文化传播体系。"}],"id":273},{"type":"single","question":"依法保护信息自由有序流动，切实保障公民基本权利和自由。全面规范企业和个人信息采集、存储、使用等行为，防范信息滥用。加强个人数据保护，依法打击网络违法犯罪。这段话主要说明了（ ）","answer":"C","options":[{"label":"A","text":"强化互联网管理"},{"label":"B","text":"形成全社会参与的治理机制"},{"label":"C","text":"维护公民合法权益"},{"label":"D","text":"加强执法能力建设"}],"id":274},{"type":"single","question":"以习近平新时代中国特色社会主义思想为指导，深入学习贯彻党的十九大和十九届二中、三中全会精神，深入学习贯彻（ ），深入学习贯彻全国网络安全和信息化工作会议提出的方针决策，不断提升全省网络安全和信息化水平，更好助推幸福美好新甘肃建设。","answer":"B","options":[{"label":"A","text":"习近平依法建党重要思想"},{"label":"B","text":"习近平网络强国战略思想"},{"label":"C","text":"习近平推进生态文明建设重要思想"},{"label":"D","text":"习近平全面深化改革重要思想"}],"id":275},{"type":"single","question":"构建（ ）同心圆，共同为实现中华民族伟大复兴的中国梦而奋斗","answer":"D","options":[{"label":"A","text":"网络安全"},{"label":"B","text":"信息安全化"},{"label":"C","text":"网络发展"},{"label":"D","text":"网上网下"}],"id":276},{"type":"single","question":"关键信息基础设施的运营者在中华人民共和国境内运营中收集和产生的个人信息和重要数据应当在境内存储。因业务需要，确需向境外提供的，应当按照（ ）会同国务院有关部门制定的办法进行安全评估；法律、行政法规另有规定的，依照其规定。","answer":"C","options":[{"label":"A","text":"公安机关"},{"label":"B","text":"国家安全机关"},{"label":"C","text":"国家网信部门"},{"label":"D","text":"有关主管部门"}],"id":277},{"type":"single","question":"要狠抓网络安全责任落实。要（ ），加强对信息系统开发、使用、运维人员的管理，加大考核力度，对各类违规、违章和网络信息安全事件，严肃问责、坚决处理。","answer":"C","options":[{"label":"A","text":"生产与管理并重,人防与技措并重"},{"label":"B","text":"内防与外控并重,人防与技防并重"},{"label":"C","text":"内控与外防并重,人防与技防并重"},{"label":"D","text":"内防与外控并重，人防与技措并重"}],"id":278},{"type":"single","question":"党的十八大以来，党中央重视互联网、发展互联网、治理互联网，统筹协调涉及政治、经济、文化、社会、军事等领域（ ）和（ ）重大问题，作出一系列重大决策、提出一系列重大举措，推动网信事业取得历史性成就。","answer":"C","options":[{"label":"A","text":"网络化信息安全"},{"label":"B","text":"信息安全数据安全"},{"label":"C","text":"信息化网络安全"},{"label":"D","text":"网络安全信息安全"}],"id":279},{"type":"single","question":"国务院和省、自治区、直辖市人民政府应当统筹规划，加大投入，扶持重点网络安全技术产业和项目，支持（ ）的研究开发和应用，推广安全可信的网络产品和服务，保护网络技术知识产权，支持企业、研究机构和高等学校等参与国家网络安全技术创新项目。","answer":"D","options":[{"label":"A","text":"网络安全"},{"label":"B","text":"信息安全"},{"label":"C","text":"网络空间"},{"label":"D","text":"技术人员"}],"id":280},{"type":"single","question":"要提高（ ）综合治理能力，形成党委领导、政府管理、企业履责、社会监督、网民自律等多主体参与，经济、法律、技术等多种手段相结合的综合治网格局。","answer":"A","options":[{"label":"A","text":"网络"},{"label":"B","text":"信息"},{"label":"C","text":"环境"},{"label":"D","text":"数据"}],"id":281},{"type":"single","question":"以下关于信息安全法治建设的意义，说法错误的是：（ ）","answer":"D","options":[{"label":"A","text":"信息安全法律环境是信息安全保障体系中的必要环节"},{"label":"B","text":"明确违反信息安全的行为，并对行为进行相应的处罚，以打击信息安全犯罪活动"},{"label":"C","text":"信息安全主要是技术问题，技术漏洞是信息犯罪的根源"},{"label":"D","text":"信息安全产业的逐渐形成，需要成熟的技术标准和完善的技术体系"}],"id":282},{"type":"single","question":"为推动和规范我国信息安全等级保护工作，我国制定和发布了信息安全等级保护工作所需要的一系列标准，这些标准可以按照等级保护工作的工作阶段大致分类。下面四个标准中，（ ）规定了等级保护定级阶段的依据、对象、流程、方法及等级变更等内容。","answer":"B","options":[{"label":"A","text":"GB／T20271-2006《信息系统通用安全技术要求》"},{"label":"B","text":"GB／T22240-2008《信息系统安全保护等级定级指南》"},{"label":"C","text":"GB／T25070-2010《信息系统等级保护安全设计技术要求》"},{"label":"D","text":"GB／T20269-2006《信息系统安全管理要求》"}],"id":283},{"type":"single","question":"对涉密系统进行安全保密测评应当依据以下哪个标准?（ ）","answer":"B","options":[{"label":"A","text":"BMB20-2007《涉及国家秘密的计算机信息系统分级保护管理规范》"},{"label":"B","text":"BMB22-2007《涉及国家秘密的计算机信息系统分级保护测评指南》"},{"label":"C","text":"GB17859-1999《计算机信息系统安全保护等级划分准则》"},{"label":"D","text":"GB／T20271-2006《信息安全技术信息系统统用安全技术要求》"}],"id":284},{"type":"single","question":"2016年11月7日中华人民共和国第十二届全国人民代表大会常务委员会第二十四次会议通过(A)（ ）","answer":"A","options":[{"label":"A","text":"《中华人民共和国网络安全法》"},{"label":"B","text":"《中华人民共和国信息安全法》"},{"label":"C","text":"《中华人民共和国网络与信息安全法》"},{"label":"D","text":"《中华人民共和国网络空间法》"}],"id":285},{"type":"single","question":"国家坚持（ ）发展并重，遵循积极利用、科学发展、依法管理、确保安全的方针，推进网络基础设施建设和互联互通，鼓励网络技术创新和应用，支持培养网络安全人才，建立健全网络安全保障体系，提高网络安全保护能力。","answer":"D","options":[{"label":"A","text":"网络安全"},{"label":"B","text":"网络与信息安全"},{"label":"C","text":"信息安全"},{"label":"D","text":"网络安全与信息化"}],"id":286},{"type":"single","question":"国家通过制定统一的（ ）等级保护管理规范和技术标准，组织公民、法人和其他组织对信息系统分等级实行安全保护，对等级保护工作的实施进行监督、管理。","answer":"A","options":[{"label":"A","text":"信息安全"},{"label":"B","text":"网络安全"},{"label":"C","text":"网络空间"},{"label":"D","text":"核心技术"}],"id":287},{"type":"single","question":"信息系统受到破坏后，会对公民、法人和其他组织的合法权益产生严重损害，或者对社会秩序和公共利益造成损害，但不损害国家安全。此段话描述了信息安全保护等级中的（B）系统（ ）","answer":"B","options":[{"label":"A","text":"第一级"},{"label":"B","text":"第二级"},{"label":"C","text":"第五级"},{"label":"D","text":"第六级"}],"id":288},{"type":"single","question":"信息系统运营、使用单位应当依据本办法和（ ）确定信息系统的安全保护等级","answer":"B","options":[{"label":"A","text":"《中华人民共和国计算机系统保护条例》"},{"label":"B","text":"《信息系统安全等级保护定级指南》"},{"label":"C","text":"《信息安全等级保护管理办法》"},{"label":"D","text":"《信息系统安全等级保护实施指南》"}],"id":289},{"type":"single","question":"跨省或者全国统一联网运行的信息系统可以由（ ）部门统一确定安全保护等级。","answer":"A","options":[{"label":"A","text":"主管"},{"label":"B","text":"相关"},{"label":"C","text":"公安"},{"label":"D","text":"评测机构"}],"id":290},{"type":"single","question":"信息系统的安全保护等级确定后，运营、使用单位应当按照国家信息安全等级保护管理规范和技术标准，使用符合国家有关规定，满足信息系统安全保护等级需求的（ ），开展信息系统安全建设或者改建工作。","answer":"C","options":[{"label":"A","text":"信息技术产品"},{"label":"B","text":"信息技术"},{"label":"C","text":"网络安全产品"},{"label":"D","text":"网络安全技术"}],"id":291},{"type":"single","question":"信息系统建设完成后，运营、使用单位或者其主管部门应当选择符合《信息安全等级保护管理办法》规定条件的测评机构，依据《信息系统安全等级保护测评要求》等技术标准，（ ）对信息系统安全等级状况开展等级测评。","answer":"B","options":[{"label":"A","text":"每年"},{"label":"B","text":"定期"},{"label":"C","text":"每半年"},{"label":"D","text":"看情况"}],"id":292},{"type":"single","question":"跨省或者全国统一联网运行的信息系统在各地运行、应用的分支系统，应当向当地设区的市级以上（ ）备案","answer":"C","options":[{"label":"A","text":"网信办"},{"label":"B","text":"国家计算机中心"},{"label":"C","text":"公安机关"},{"label":"D","text":"工信部"}],"id":293},{"type":"single","question":"信息系统备案后，公安机关应当对信息系统的备案情况进行审核，对符合等级保护要求的，应当在收到备案材料之日起的（ ）个工作日内颁发信息系统安全等级保护备案证明。","answer":"B","options":[{"label":"A","text":"5"},{"label":"B","text":"10"},{"label":"C","text":"15"},{"label":"D","text":"20"}],"id":294},{"type":"single","question":"（ ）信息系统应当依据国家信息安全等级保护的基本要求，按照国家保密工作部门有关（ ）信息系统分级保护的管理规定和技术标准，结合系统实际情况进行保护。非（ ）信息系统不得处理国家秘密信息。","answer":"C","options":[{"label":"A","text":"重要"},{"label":"B","text":"核心"},{"label":"C","text":"涉密"},{"label":"D","text":"关键"}],"id":295},{"type":"single","question":"涉密信息系统按照所处理信息的最高密级，由低到高分为（ ）三个等级","answer":"A","options":[{"label":"A","text":"秘密、机密、绝密"},{"label":"B","text":"普通、一般、重要"},{"label":"C","text":"重要、特别重要、核心"},{"label":"D","text":"绝密、机密、秘密"}],"id":296},{"type":"single","question":"为了维护社会主义市场经济秩序和社会管理秩序，对有下列行为之一，构成犯罪的，依照刑法有关规定追究刑事责任；下列不属于该项的是（ ）","answer":"D","options":[{"label":"A","text":"利用互联网销售伪劣产品或者对商品、服务作虚假宣传；"},{"label":"B","text":"利用互联网损害他人商业信誉和商品声誉"},{"label":"C","text":"利用互联网侵犯他人知识产权；"},{"label":"D","text":"通过互联网窃取、泄露国家秘密、情报或者军事秘密；"}],"id":297},{"type":"single","question":"为了保护个人、法人和其他组织的人身、财产等合法权利，对有下列行为之一，构成犯罪的，依照刑法有关规定追究刑事责任：下列不属于该项的是（ ）","answer":"D","options":[{"label":"A","text":"利用互联网侮辱他人或者捏造事实诽谤他人"},{"label":"B","text":"非法截获、篡改、删除他人电子邮件或者其他数据资料，侵犯公民通信自由和通信秘密；"},{"label":"C","text":"利用互联网进行盗窃、诈骗、敲诈勒索"},{"label":"D","text":"利用互联网编造并传播影响证券、期货交易或者其他扰乱金融秩序的虚假信息"}],"id":298},{"type":"single","question":"（ ）在业务活动中收集、使用公民个人电子信息，应当遵循合法、正当、必要的原则，明示收集、使用信息的目的、方式和范围，并经被收集者同意，不得违反法律、法规的规定和双方的约定收集、使用信息。","answer":"C","options":[{"label":"A","text":"网络服务提供者"},{"label":"B","text":"其他企业事业单位"},{"label":"C","text":"网络服务提供者和其他企业事业单位"},{"label":"D","text":"任何组织"}],"id":299},{"type":"single","question":"（ ）未经电子信息接收者同意或者请求，或者电子信息接收者明确表示拒绝的，不得向其固定电话、移动电话或者个人电子邮箱发送商业性电子信息。","answer":"A","options":[{"label":"A","text":"任何组织和个人"},{"label":"B","text":"任何组织"},{"label":"C","text":"个人"},{"label":"D","text":"网络服务提供者和其他企业事业单位"}],"id":300},{"type":"single","question":"某同学的以下行为中不属于侵犯知识产权的是（ ）","answer":"C","options":[{"label":"A","text":"把自己从音像店购买的《美妙生活》原版CD转录，然后传给同学试听"},{"label":"B","text":"将购买的正版游戏上网到网盘中，供网友下载使用"},{"label":"C","text":"下载了网络上的一个具有试用期限的软件，安装使用"},{"label":"D","text":"把从微软公司购买的原版Windows7系统光盘复制了一份备份，并提供给同学"}],"id":301},{"type":"single","question":"任何个人和组织使用网络应当遵守宪法法律，遵守公共秩序，尊重社会公德，（ ），不得利用网络从事危害国家安全、荣誉和利益，煽动颠覆国家政权、推翻社会主义制度，煽动分裂国家、破坏国家统一，宣扬恐怖主义、极端主义，宣扬民族仇恨、民族歧视，传播暴力、淫秽色情信息，编造、传播虚假信息扰乱经济秩序和社会秩序，以及侵害他人名誉、隐私、知识产权和其他合法权益等活动。","answer":"B","options":[{"label":"A","text":"危害网络安全"},{"label":"B","text":"不得危害网络安全"},{"label":"C","text":"网络安全"},{"label":"D","text":"社会公德"}],"id":302},{"type":"single","question":"对信息安全风险评估要素理解正确的是（ ）","answer":"A","options":[{"label":"A","text":"资产识别的粒度随着评估范围、评估目的的不同而不同，既可以是硬件设备，也可以是业务系统，也可以是组织机构"},{"label":"B","text":"应针对构成信息系统的每个资产做风险评价"},{"label":"C","text":"脆弱性识别是将信息系统安全现状与国家或行业的安全要求做符合性比对而找出的差距项"},{"label":"D","text":"信息系统面临的安全威胁仅包括人为故意威胁、人为非故意威胁"}],"id":303},{"type":"single","question":"在某次信息安全应急响应过程中，小王正在实施如下措施：消除或阻断攻击源，找到并消除系统的脆弱性/漏洞、修改安全策略，加强防范措施、格式化被感染而已程序的介质等，请问，按照应急响应方法，这些工作应处于以下哪个阶段（ ）","answer":"D","options":[{"label":"A","text":"准备阶段"},{"label":"B","text":"检测阶段"},{"label":"C","text":"遏制阶段"},{"label":"D","text":"根除阶段"}],"id":304},{"type":"single","question":"信息安全事件和分类方法有多种，依据GB/Z20986-2007《信息安全技术自信安全事件分类分级指南》，信息安全事件分为7个基本类别，描述正确的是（ ）","answer":"A","options":[{"label":"A","text":"有害程序事件、网络攻击事件、信息破坏事件、信息内容安全事件、设备设施故障、灾害性事件和其他信息安全事件"},{"label":"B","text":"网络贡献事件、拒绝服务攻击事件、信息破坏事件、信息内容安全事件、设备设施故障、灾害性事件和其他信息安全事件"},{"label":"C","text":"网络攻击事件、网络钓鱼事件、信息破坏事件、信息内容安全事件、设备设施故障、灾害性事件和其他信息安全事件"},{"label":"D","text":"网络攻击事件、网络扫描窃听事件、信息破坏事件、信息内容安全事件、设备设施故障、灾害性事件和其他信息安全事件"}],"id":305},{"type":"single","question":"（ ）是指编制或者在计算机程序中插入的破坏计算机功能或者毁坏数据，影响计算机使用，并能自我复制的一组计算机指令或者程序代码。","answer":"A","options":[{"label":"A","text":"计算机病毒"},{"label":"B","text":"木马文件"},{"label":"C","text":"蠕虫"},{"label":"D","text":"恶意程序"}],"id":306},{"type":"single","question":"在设计信息系统安全保障方案时，以下哪个做法是错误的：（ ）","answer":"D","options":[{"label":"A","text":"要充分考虑用户管理和文化的可接受性，减少系统方案障碍"},{"label":"B","text":"要充分切合信息安全需求并且实际可行"},{"label":"C","text":"要充分考虑成本效益，在满足合规性要求和风险处置要求的前提下，尽量控制成本"},{"label":"D","text":"要充分采取新技术，使用过程中不断完善成熟，精益求精，实现技术投入保值要求"}],"id":307},{"type":"single","question":"关于恶意代码，以下说法错误的是：（ ）","answer":"B","options":[{"label":"A","text":"从传播范围来看，恶意代码呈现多平台传播的特征。"},{"label":"B","text":"按照运行平台，恶意代码可以分为网络传播型病毒、文件传播型病毒。"},{"label":"C","text":"不感染的依附性恶意代码无法单独执行"},{"label":"D","text":"为了对目标系统实施攻击和破坏，传播途径是恶意代码赖以生存和繁殖的基本条件"}],"id":308},{"type":"single","question":"口令破解是针对系统进行攻击的常用方法，windows系统安全策略中应对口令破解的策略主要是帐户策略中的帐户锁定策略和密码策略，关于这两个策略说明错误的是（ ）","answer":"C","options":[{"label":"A","text":"密码策略对系统中所有的用户都有效"},{"label":"B","text":"密码策略主要作用是通过策略避免拥护生成弱口令及对用户的口令使用进行管控"},{"label":"C","text":"账户锁定策略只适用于普通用户，无法保护管理员administrator账户应对口令暴力破解攻击"},{"label":"D","text":"账户锁定策略的主要作用是应对口令暴力破解攻击，能有效地保护所有系统用户应对口令暴力破解攻击"}],"id":309},{"type":"single","question":"\"对发生计算机安全事故和案件的计算机信息系统，如存在安全隐患的，______应当要求限期整改\"（ ）","answer":"C","options":[{"label":"A","text":"发案单位主管部门"},{"label":"B","text":"人民法院"},{"label":"C","text":"公安机关"},{"label":"D","text":"以上都可以"}],"id":310},{"type":"single","question":"虚拟专网的重点在于建立安全的数据通道，构造这条安全通道的协议必须具备多项条件，以下哪条不属于构造的必备条件（ ）","answer":"D","options":[{"label":"A","text":"保证通道的机密性"},{"label":"B","text":"保证数据的真实性"},{"label":"C","text":"保证数据的完整性"},{"label":"D","text":"提供网络信息数据的纠错功能和冗余处理"}],"id":311},{"type":"single","question":"基于网络的入侵监测系统的信息源是（ ）","answer":"A","options":[{"label":"A","text":"网络中的数据包"},{"label":"B","text":"系统的审计日志"},{"label":"C","text":"系统的行为数据"},{"label":"D","text":"应用程序的事务日志文件"}],"id":312},{"type":"single","question":"国家（ ）负责统筹协调网络安全工作和相关监督管理工作。国务院（ ）、（ ）和其他有关机关依照本法和有关法律、行政法规的规定，在各自职责范围内负责网络安全保护和监督管理工作","answer":"D","options":[{"label":"A","text":"各级人民政府，网信部门，电信主管部门"},{"label":"B","text":"电信主管部门，网信部门，公安部门"},{"label":"C","text":"公安部门，电信主管部门，网信部门"},{"label":"D","text":"网信部门，电信主管部门，公安部门"}],"id":313},{"type":"single","question":"网络运营者应当采取（ ）措施和其他（ ）措施，确保其收集的个人信息安全，防止信息泄露、毁损、丢失","answer":"C","options":[{"label":"A","text":"管理合理"},{"label":"B","text":"管理必要"},{"label":"C","text":"技术必要"},{"label":"D","text":"技术合理"}],"id":314},{"type":"single","question":"（ ）和有关部门违反《中华人民共和国网络安全法》，将在履行网络安全保护职责中获取的信息用于其他用途的，对直接负责的主管人员和其他直接责任人员依法给予处分。","answer":"B","options":[{"label":"A","text":"公安机关"},{"label":"B","text":"网信部门"},{"label":"C","text":"工信部门"},{"label":"D","text":"检察院"}],"id":315},{"type":"single","question":"关键信息基础设施的运营者应当自行或者委托网络安全服务机构对其网络的安全性和可能存在的风险（ ）检测评估，并将检测评估情况和改进措施报送相关负责关键信息基础设施安全保护工作的部门。","answer":"D","options":[{"label":"A","text":"至少每年两次"},{"label":"B","text":"至少半年一次"},{"label":"C","text":"至少两年一次"},{"label":"D","text":"至少一年一次"}],"id":316},{"type":"single","question":"国家网信部门协调有关部门（ ）健全网络安全风险评估和应急工作机制，制定网络安全事件应急预案，并定期组织演练。","answer":"C","options":[{"label":"A","text":"调动"},{"label":"B","text":"保护"},{"label":"C","text":"建立"},{"label":"D","text":"制定"}],"id":317},{"type":"single","question":"《中华人民共和国网络安全法》规定,为了保障网络安全,维护网络空间主权和国家安全、（ ）,保护公民、法人和其他组织的合法权益,促进经济社会信息化健康发展,制定本法。","answer":"A","options":[{"label":"A","text":"社会公共利益"},{"label":"B","text":"国家利益"},{"label":"C","text":"私人企业利益"},{"label":"D","text":"国有企事业单位利益"}],"id":318},{"type":"single","question":"个人发现网络运营者违反法律、行政法规的规定或者双方的约定收集、使用其个人信息的，有权要求网络运营者（ ）其个人信息。","answer":"C","options":[{"label":"A","text":"保护"},{"label":"B","text":"更正"},{"label":"C","text":"删除"},{"label":"D","text":"撤销"}],"id":319},{"type":"single","question":"任何个人和组织不得从事非法侵入他人网络、干扰他人网络正常功能、窃取（ ）等危害网络安全的活动；","answer":"B","options":[{"label":"A","text":"机密"},{"label":"B","text":"网络数据"},{"label":"C","text":"信息"},{"label":"D","text":"资料"}],"id":320},{"type":"single","question":"网络运营者应当为公安机关、国家安全机关依法维护（ ）和侦查犯罪的活动提供技术支持和协助。","answer":"B","options":[{"label":"A","text":"个人安全"},{"label":"B","text":"国家安全"},{"label":"C","text":"人民利益"},{"label":"D","text":"个人利益"}],"id":321},{"type":"single","question":"国家支持网络运营者之间在网络安全信息收集、分析、通报和应急处置等方面（ ），提高网络运营者的安全保障能力","answer":"A","options":[{"label":"A","text":"进行合作"},{"label":"B","text":"相互竞争"},{"label":"C","text":"互相协作"},{"label":"D","text":"协同作战"}],"id":322},{"type":"single","question":"以下Internet应用中违反《计算机信息系统安全保护条例》的是（ ）","answer":"A","options":[{"label":"A","text":"侵入网站获取机密"},{"label":"B","text":"参加网络远程教学"},{"label":"C","text":"通过电子邮件与朋友交流"},{"label":"D","text":"到CCTV网站看电视直播"}],"id":323},{"type":"single","question":"我国《电子签名法》第三条规定：“当事人约定使用电子签名、数据电文的文书，不得仅因为其采用电子签名、数据电文的形式而否认其效力”。原则是（ ）","answer":"C","options":[{"label":"A","text":"公平原则"},{"label":"B","text":"歧视性原则"},{"label":"C","text":"功能等同原则"},{"label":"D","text":"非歧视性原则"}],"id":324},{"type":"single","question":"《计算机病毒防治管理办法》规定,（ ）主管全国的计算机病毒防治管理工作。","answer":"C","options":[{"label":"A","text":"信息产业部"},{"label":"B","text":"国家病毒防范管理中心"},{"label":"C","text":"公安部公共信息网络安全监察"},{"label":"D","text":"国务院信息化建设领导小组"}],"id":325},{"type":"single","question":"《治安管理处罚法》的规定,煽动民族仇恨、民族歧视,或者在出版物、计算机信息网络中刊载民族歧视、侮辱内容的,处10日以上15日以下拘留,可以并处（ ）以下罚款。","answer":"B","options":[{"label":"A","text":"500元"},{"label":"B","text":"1000元"},{"label":"C","text":"3000元"},{"label":"D","text":"5000元"}],"id":326},{"type":"single","question":"美国高中生弗雷。帕森对冲击波病毒进行了修改并传播了一系列的病毒变种,是全球近50万的电脑受到攻击,针对这一行为下列说法不正确的是（ ）","answer":"A","options":[{"label":"A","text":"该生属于思想意识问题,并没有触及法律。"},{"label":"B","text":"该生已经触及法律,应受到法律的制裁。"},{"label":"C","text":"网络用户应该引起高度重视,增强防范意识"},{"label":"D","text":"人人都应自觉遵守网络道德规范。"}],"id":327},{"type":"single","question":"对于违反信息安全法律、法规行为的行政处罚中,（ ）是较轻的处罚方式","answer":"A","options":[{"label":"A","text":"警告"},{"label":"B","text":"罚款"},{"label":"C","text":"没收违法所得"},{"label":"D","text":"吊销许可证"}],"id":328},{"type":"single","question":"国家网信部门应当统筹协调有关部门对关键信息基础设施采取安全保护措施，下面哪项描述是错误的？（ ）","answer":"C","options":[{"label":"A","text":"对关键信息基础设施的安全风险进行抽查检测，提出改进措施，必要时可以委托网络安全服务机构对网络存在的安全风险进行检测评估"},{"label":"B","text":"定期组织关键信息基础设施的运营者进行网络安全应急演练，提高应对网络安全事件的水平和协同配合能力"},{"label":"C","text":"有关部门、关键信息基础设施的运营者以及有关研究机构、网络安全服务机构等之间的网络安全信息应保持独立"},{"label":"D","text":"对网络安全事件的应急处置与网络功能的恢复等，提供技术支持和协助"}],"id":329},{"type":"single","question":"中华人民共和国网络安全法》规定，拒不向公安机关、国家安全机关提供技术支持和协助的网络运营者，由有关主管部门责令改正；拒不改正或者情节严重的，对直接负责的主管人员和其他直接责任人员处（ ）","answer":"B","options":[{"label":"A","text":"五万元以上五十万元以下罚款"},{"label":"B","text":"一万元以上十万元以下罚款"},{"label":"C","text":"十万元以上五十万元以下罚款"},{"label":"D","text":"一万元以上五万元以下罚款"}],"id":330},{"type":"single","question":"《计算机信息网络国际联网安全保护管理办法》规定，任何单位和个人不得从事的条目中，以下哪个不包含在内？（ ）","answer":"D","options":[{"label":"A","text":"未经允许，进入计算机信息网络或者使用计算机信息网络资源的"},{"label":"B","text":"未经允许，对计算机信息网络功能进行删除、修改或者增加的"},{"label":"C","text":"故意制作、传播计算机病毒等破坏性程序的"},{"label":"D","text":"未经允许，对他人的计算机进行使用"}],"id":331},{"type":"single","question":"《网络安全法》立法的首要目的是（ ）","answer":"A","options":[{"label":"A","text":"保障网络安全"},{"label":"B","text":"维护网络空间主权和国家安全、社会公共利益"},{"label":"C","text":"保护公民、法人和其他组织的合法权益"},{"label":"D","text":"促进经济社会信息化健康发展"}],"id":332},{"type":"single","question":"《网络安全法》的第一条讲的是（ ）。","answer":"B","options":[{"label":"A","text":"法律调整范围"},{"label":"B","text":"立法目的"},{"label":"C","text":"国家网络安全战略"},{"label":"D","text":"国家维护网络安全的主要任务"}],"id":333},{"type":"single","question":"《网络安全法》第五章中规定，下列职责中，责任主体为网络运营者的是（ ）。","answer":"D","options":[{"label":"A","text":"统筹网络安全信息收集、分析和通报，统一发布网络安全监测预警信息"},{"label":"B","text":"建立健全本行业、本领域的网络安全监测预警和信息通报制度，按照规定报送预警信息"},{"label":"C","text":"制定本行业、本领域的网络安全事件应急预案，定期组织演练"},{"label":"D","text":"按照省级以上人民政府的要求进行整改，消除隐患"}],"id":334},{"type":"single","question":"国家保护公民、法人和其他组织依法使用网络的权利，促进网络接入普及，（ ），为社会提供安全、便利的网络服务，保障网络信息依法有序自由流动。","answer":"D","options":[{"label":"A","text":"服务水平"},{"label":"B","text":"网络服务"},{"label":"C","text":"业务水平"},{"label":"D","text":"提升网络服务水平"}],"id":335},{"type":"single","question":"网络产品、服务应当符合相关国家标准的强制性要求。网络产品、服务的提供者不得设置（ ）；发现其网络产品、服务存在安全缺陷、漏洞等风险时，应当立即采取补救措施，按照规定及时告知用户并向有关主管部门报告。","answer":"A","options":[{"label":"A","text":"恶意程序"},{"label":"B","text":"病毒"},{"label":"C","text":"木马"},{"label":"D","text":"程序"}],"id":336},{"type":"single","question":"网络关键设备和网络安全专用产品应当按照相关国家标准的强制性要求，由具备资格的机构安全认证合格或者安全检测符合要求后，方可销售或者提供。国家网信部门会同国务院有关部门制定、公布网络关键设备和网络安全专用产品目录，并推动安全认证和安全(D)，避免重复认证、检测。（ ）","answer":"D","options":[{"label":"A","text":"机制"},{"label":"B","text":"检测"},{"label":"C","text":"结果"},{"label":"D","text":"检测结果互认"}],"id":337},{"type":"single","question":"因网络安全事件，发生（ ）或者生产安全事故的，应当依照《中华人民共和国突发事件应对法》、《中华人民共和国安全生产法》等有关法律、行政法规的规定处置。","answer":"A","options":[{"label":"A","text":"突发事件"},{"label":"B","text":"特殊事件"},{"label":"C","text":"特定事件"},{"label":"D","text":"紧急事件"}],"id":338},{"type":"single","question":"关键信息基础设施的运营者不履行本法第三十三条、第三十四条、第三十六条、第三十八条规定的网络安全（ ）的，由有关主管部门责令改正，给予警告；拒不改正或者导致危害网络安全等后果的，处十万元以上一百万元以下罚款，对直接负责的主管人员处一万元以上十万元以下罚款。","answer":"C","options":[{"label":"A","text":"保护"},{"label":"B","text":"责任"},{"label":"C","text":"保护义务"},{"label":"D","text":"义务"}],"id":339},{"type":"single","question":"电子信息发送服务提供者和应用软件下载服务提供者，应当履行（ ），知道其用户有前款规定行为的，应当停止提供服务，采取消除等处置措施，保存有关记录，并向有关主管部门报告。","answer":"A","options":[{"label":"A","text":"安全管理义务"},{"label":"B","text":"安全义务"},{"label":"C","text":"管理义务"},{"label":"D","text":"安全责任"}],"id":340},{"type":"single","question":"国家建立网络安全监测预警和信息通报制度。国家网信部门应当（ ）有关部门加强网络安全信息收集、分析和通报工作，按照规定统一发布网络安全监测预警信息。","answer":"B","options":[{"label":"A","text":"统筹"},{"label":"B","text":"统筹协调"},{"label":"C","text":"协调"},{"label":"D","text":"安排"}],"id":341},{"type":"single","question":"关于《中华人民共和国网络安全法》以下说法正确的是（ ）","answer":"C","options":[{"label":"A","text":"《中华人民共和国网络安全法》规定工业和信息化主管部门负责统筹协调网络安全工作和相关监督管理工作。"},{"label":"B","text":"《中华人民共和国网络安全法》规定收到举报的部门应当及时依法作出处理；不属于本部门职责的应全部向上级汇报。"},{"label":"C","text":"《中华人民共和国网络安全法》规定有关部门应当对举报人的相关信息予以保密保护举报人的合法权益。"},{"label":"D","text":"《中华人民共和国网络安全法》规定国家不支持企业、研究机构、高等学校、网络相关行业组织参与网络安全国家标准、行业标准的制定。"}],"id":342},{"type":"single","question":"个人发现网络运营者违反法律、行政法规的规定或者双方的约定收集、使用其个人信息的，（ ）要求网络运营者删除其个人信息；发现网络运营者收集、存储的其个人信息有错误的，有权要求网络运营者予以更正。网络运营者应当采取措施予以删除或者更正。","answer":"B","options":[{"label":"A","text":"无权"},{"label":"B","text":"有权"},{"label":"C","text":"有利于"},{"label":"D","text":"有责任"}],"id":343},{"type":"single","question":"任何个人和组织应当对其（ ）的行为负责，不得设立用于实施诈骗，传授犯罪方法，制作或者销售违禁物品、管制物品等违法犯罪活动的网站、通讯群组，不得利用网络发布涉及实施诈骗，制作或者销售违禁物品、管制物品以及其他违法犯罪活动的信息。","answer":"D","options":[{"label":"A","text":"上网"},{"label":"B","text":"聊天"},{"label":"C","text":"网购"},{"label":"D","text":"使用网络"}],"id":344},{"type":"single","question":"国家网信部门应当统筹协调有关部门加强网络安全信息收集、分析和通报工作，按照规定统一发布（ ）","answer":"D","options":[{"label":"A","text":"网络舆情预警"},{"label":"B","text":"网络应急预警"},{"label":"C","text":"信息安全预警"},{"label":"D","text":"网络安全监测预警"}],"id":345},{"type":"single","question":"要切实贯彻落实好，着力推动互联网和（ ）深度融合发展，以信息流带动技术流、资金流、人才流、物资流，促进资源配置优化，促进全要素生产率提升，为推动创新发展、转变经济发展方式、调整经济结构发挥积极作用。","answer":"A","options":[{"label":"A","text":"实体经济"},{"label":"B","text":"信息化经济"},{"label":"C","text":"虚拟经济"},{"label":"D","text":"生态文化"}],"id":346},{"type":"single","question":"我们不拒绝任何新技术，新技术是人类文明发展的成果，只要有利于提高我国社会生产力水平、有利于改善人民生活，我们都不拒绝。问题是要搞清楚哪些是可以引进但必须安全可控的，哪些是可以引进消化吸收再创新的，哪些是可以同别人合作开发的，哪些是必须依靠自己的力量自主创新的。（ ）的根源问题是基础研究问题，基础研究搞不好，应用技术就会成为无源之水、无本之木。","answer":"C","options":[{"label":"A","text":"互联网技术"},{"label":"B","text":"网络技术"},{"label":"C","text":"核心技术"},{"label":"D","text":"信息化技术"}],"id":347},{"type":"single","question":"以下哪一项是数据完整性得到保护的例子?（ ）","answer":"B","options":[{"label":"A","text":"某网站在访问量突然增加时对用户连接数量进行了限制，保证已登录的用户可以完成操作"},{"label":"B","text":"在提款过程中ATM终端发生故障，银行业务系统及时对该用户的账户余额进行了冲正操作"},{"label":"C","text":"某网管系统具有严格的审计功能，可以确定哪个管理员在何时对核心交换机进行了什么操作"},{"label":"D","text":"李先生在每天下班前将重要文件锁在档案室的保密柜中，使伪装成清洁工的商业间谍无法查看"}],"id":348},{"type":"single","question":"金女士经常通过计算机在互联网上购物，从安全角度看，下面哪项是不好的习惯（ ）","answer":"A","options":[{"label":"A","text":"使用专用上网购物用计算机，安装好软件后不要对该计算机上的系统软件，应用软件进行升级"},{"label":"B","text":"为计算机安装具有良好声誉的安全防护软件，包括病毒查杀，安全检查和安全加固方面的软件"},{"label":"C","text":"在IE的配置中，设置只能下载和安装经过签名的，安全的ActiveX控件"},{"label":"D","text":"在使用网络浏览器时，设置不在计算机中保留网络历史纪录和表单数据"}],"id":349},{"type":"single","question":"某公司开发了一个游戏网站，但是由于网站软件存在漏洞，在网络中传输大数据包时总是会丢失一些数据，如一次性传输大于2000个字节数据时，总是会有3到5个字节不能传送到对方，关于此案例，可以推断的是（ ）","answer":"B","options":[{"label":"A","text":"该网站软件存在保密性方面安全问题"},{"label":"B","text":"该网站软件存在完整性方面安全问题"},{"label":"C","text":"该网站软件存在可用性方面安全问题"},{"label":"D","text":"该网站软件存在不可否认性方面安全问题"}],"id":350},{"type":"single","question":"在Windows系统中，管理权限最高的组是（ ）","answer":"B","options":[{"label":"A","text":"everyone"},{"label":"B","text":"administrators"},{"label":"C","text":"powerusers"},{"label":"D","text":"users"}],"id":351},{"type":"single","question":"某黑客通过分析和整理某报社记者小张的博客，找到一些有用的信息，通过伪装的新闻线索，诱使其执行木马程序，从而控制了小张的电脑，并以她的电脑为攻击的端口，使报社的局域网全部感染木马病毒，为防范此类社会工程学攻击，报社不需要做的是（ ）","answer":"D","options":[{"label":"A","text":"加强信息安全意识培训，提高安全防范能力，了解各种社会工程学攻击方法，防止受到此类攻击"},{"label":"B","text":"建立相应的安全相应应对措施，当员工受到社会工程学的攻击，应当及时报告"},{"label":"C","text":"教育员工注重个人隐私保护"},{"label":"D","text":"减少系统对外服务的端口数量，修改服务旗标"}],"id":352},{"type":"single","question":"在网络信息系统建设中部署防火墙，往往用于提高内部网络的安全防护能力。某公司准备部署一台防火墙来保护内网主机，下列选项中部署位置正确的是（ ）","answer":"A","options":[{"label":"A","text":"内网主机——交换机——防火墙——外网"},{"label":"B","text":"防火墙——内网主机——交换机——外网"},{"label":"C","text":"内网主机——防火墙——交换机——外网"},{"label":"D","text":"防火墙——交换机——内网主机——外网"}],"id":353},{"type":"single","question":"注册或者浏览社交类网站时，不恰当的做法是（ ）","answer":"D","options":[{"label":"A","text":"尽量不要填写过于详细的个人资料"},{"label":"B","text":"不要轻易加社交网站好友"},{"label":"C","text":"充分利用社交网站的安全机制"},{"label":"D","text":"信任他人转载的信息"}],"id":354},{"type":"single","question":"下列有关加快农村互联网建设步伐的说法，错误的是（ ）","answer":"A","options":[{"label":"A","text":"促进农业工业化、信息化和现代化的进程，减少劳动力；"},{"label":"B","text":"相比城市，农村互联网基础设施建设是我们的短板；"},{"label":"C","text":"提高农业生产智能化、经营网络化水平，帮助广大农民增加收入；"},{"label":"D","text":"加快推进电子政务，鼓励各级政府部门打破信息壁垒、提升服务效率"}],"id":355},{"type":"single","question":"应将信息化建设和推广项目开发与工作环境纳入（ ）统一管理,在（ ）划分独立的安全域","answer":"C","options":[{"label":"A","text":"信息外网,信息外网"},{"label":"B","text":"信息内网,信息外网"},{"label":"C","text":"信息内网,信息内网"},{"label":"D","text":"信息外网,信息内网"}],"id":356},{"type":"single","question":"业务信息系统上线前应组织对统一开发的业务信息系统进行安全测评,测评合格后（ ）","answer":"B","options":[{"label":"A","text":"方可上线"},{"label":"B","text":"可通过验收"},{"label":"C","text":"可建转运"},{"label":"D","text":"进行升级"}],"id":357},{"type":"single","question":"信息安全风险评估包括资产评估、（ ）、脆弱性评估、现有安全措施评估、风险计算和分析、风险决策和安全建议等评估内容。","answer":"B","options":[{"label":"A","text":"安全评估"},{"label":"B","text":"威胁评估"},{"label":"C","text":"漏洞评估"},{"label":"D","text":"攻击评估"}],"id":358},{"type":"single","question":"物理安全防护要求中“电源线和通信线缆隔离铺设，避免互相干扰，并对关键设备和磁介质实施电磁屏蔽。”，其主要目的是保证系统的（ ）","answer":"C","options":[{"label":"A","text":"完整性"},{"label":"B","text":"可用性"},{"label":"C","text":"保密性"},{"label":"D","text":"抗抵赖性"}],"id":359},{"type":"single","question":"下面哪一种是社会工程（ ）","answer":"B","options":[{"label":"A","text":"缓冲区溢出"},{"label":"B","text":"电话联系组织机构的接线员询问用户名和口令"},{"label":"C","text":"SQL注入攻击"},{"label":"D","text":"利用PKI/ca构建可信网络"}],"id":360},{"type":"single","question":"iPhone手机“越狱”是指（ ）","answer":"B","options":[{"label":"A","text":"带着手机逃出去"},{"label":"B","text":"通过不正常手段获得苹果手机操作系统的最高权限"},{"label":"C","text":"对操作系统升级"},{"label":"D","text":"修补苹果手机的漏洞"}],"id":361},{"type":"single","question":"在连接互联网的计算机上（ ）处理、存储涉及国家秘密和企业秘密信息。","answer":"B","options":[{"label":"A","text":"可以"},{"label":"B","text":"严禁"},{"label":"C","text":"不确定"},{"label":"D","text":"只要网络环境是安全的，就可以"}],"id":362},{"type":"single","question":"我们应当及时修复计算机操作系统和软件的漏洞，是因为（ ）","answer":"C","options":[{"label":"A","text":"操作系统漏洞补丁及时升级，软件漏洞补丁就没有必要及时修复"},{"label":"B","text":"以前经常感染病毒的机器，现在就不存在什么漏洞了"},{"label":"C","text":"漏洞就是计算机系统或软件系统的缺陷，病毒和恶意软件可以通过这个缺陷乘虚而入"},{"label":"D","text":"手动更新后，玩游戏时操作系统就不会自动更新，不会占用网络带宽了"}],"id":363},{"type":"single","question":"越来越多的人习惯于用手机里的支付宝、微信等付账，因为很方便，但这也对个人财产的安全产生了威胁。以下哪个选项对我们的个人财产存在一定威胁（ ）。","answer":"C","options":[{"label":"A","text":"使用手机里的支付宝、微信付款输入密码时避免别人看到"},{"label":"B","text":"支付宝、微信支付密码不设置常用密码"},{"label":"C","text":"支付宝、微信设置自动登录"},{"label":"D","text":"不在陌生网络中使用"}],"id":364},{"type":"single","question":"现在网络购物越来越多，以下哪个措施不可以防范网络购物的风险（ ）","answer":"D","options":[{"label":"A","text":"核实网站资质及网站联系方式的真伪"},{"label":"B","text":"尽量到知名、权威的网上商城购物"},{"label":"C","text":"注意保护个人隐私"},{"label":"D","text":"相信网上低价推销广告"}],"id":365},{"type":"single","question":"张三将微信个人头像换成微信群中某好友头像，并将昵称改为该好友的昵称，然后向该好友的其他好友发送一些欺骗信息。该攻击行为属于以下哪类攻击（ ）","answer":"D","options":[{"label":"A","text":"口令攻击"},{"label":"B","text":"暴力破解"},{"label":"C","text":"拒绝服务攻击"},{"label":"D","text":"社会工程学攻击"}],"id":366},{"type":"single","question":"某网站吸纳会员时要求交纳相应会费，交纳后网站就会给购买者一个会员编号和一个会员“昵称”，该购买者就正式成为网站会员。成为会员后，就可自由发展下线，收取提成，形成五五复制的上下级关系。这种行为属于（ ）","answer":"A","options":[{"label":"A","text":"网络传销"},{"label":"B","text":"网络钓鱼"},{"label":"C","text":"网络攻击"},{"label":"D","text":"网络诈骗"}],"id":367},{"type":"single","question":"现在的智能设备能直接收集到身体相应信息，比如我们佩戴的手环收集个人健康数据。以下哪个行为可能造成个人信息泄露（ ）","answer":"C","options":[{"label":"A","text":"手环不外借他人"},{"label":"B","text":"不接入陌生网络"},{"label":"C","text":"分享跑步时的路径信息"},{"label":"D","text":"手环电量低"}],"id":368},{"type":"single","question":"小明刚刚认识的网友让小明提供他的银行账号和身份证复印件等隐私信息，他最合适的做法是（ ）","answer":"B","options":[{"label":"A","text":"这肯定不怀好意马上报警"},{"label":"B","text":"网上很多都是陷阱，不予理睬"},{"label":"C","text":"只告诉网友自己的银行账号和密码"},{"label":"D","text":"只提供自己的身份证复印件"}],"id":369},{"type":"single","question":"如何防范个人口令被字典暴力攻击（ ）","answer":"A","options":[{"label":"A","text":"定期更换口令"},{"label":"B","text":"使用过短的口令"},{"label":"C","text":"避免使用动态口令卡产生的口令"},{"label":"D","text":"无需限定从一个给定的终端进行非法认证的次数"}],"id":370},{"type":"single","question":"在日常操作中，以下没有遵循道德规范的是（ ）","answer":"C","options":[{"label":"A","text":"不用计算机干扰他人生活"},{"label":"B","text":"不用计算机进行盗窃"},{"label":"C","text":"无需尊重他人的知识产权，盗用他人的智力成果"},{"label":"D","text":"资源共享，平等地使用网络中的信息资源"}],"id":371},{"type":"single","question":"使用电脑过程中，哪个不是网络安全防范措施（ ）","answer":"D","options":[{"label":"A","text":"安装防火墙和防病毒软件，并经常升级"},{"label":"B","text":"经常给系统打补丁，堵塞软件漏洞"},{"label":"C","text":"不上一些不太了解的网站，不打开QQ上传来的不明文件"},{"label":"D","text":"经常清理电脑中不常用的软件和文件"}],"id":372},{"type":"single","question":"以下关于盗版软件的说法，错误的是（ ）","answer":"A","options":[{"label":"A","text":"若出现问题可以找开发商负责赔偿损失"},{"label":"B","text":"使用盗版软件是违法的"},{"label":"C","text":"成为计算机病毒的重要来源和传播途径之一"},{"label":"D","text":"可能会包含不健康的内容"}],"id":373},{"type":"single","question":"下面的角色对应的信息安全职责不合理的是：（ ）","answer":"B","options":[{"label":"A","text":"高级管理层——最终责任"},{"label":"B","text":"信息安全部门主管——提供各种信息安全工作必须的资源"},{"label":"C","text":"系统的普通使用者——遵守日常操作规范"},{"label":"D","text":"审计人员——检查安全策略是否被遵从"}],"id":374},{"type":"single","question":"某单位人员管理系统在人员离职时进行账号删除，需要离职员工所在部门主管经理和人事部门人员同时进行确认才能在系统上执行，该设计是遵循了软件安全哪项原则（ ）","answer":"D","options":[{"label":"A","text":"最小权限"},{"label":"B","text":"纵深防御"},{"label":"C","text":"不信任"},{"label":"D","text":"权限分离"}],"id":375},{"type":"single","question":"某单位开发了一个面向互联网提供服务的应用网站，该单位委托软件测评机构对软件进行了源代码分析、模糊测试等软件安全性测试，在应用上线前，项目经理提出了还需要对应用网站进行一次渗透性测试，作为安全主管，你需要提出渗透性测试相比源代码测试、模糊测试的优势给领导做决策，以下哪条是渗透性测试的优势?（ ）","answer":"A","options":[{"label":"A","text":"渗透测试以攻击者的思维模拟真实攻击，能发现如配置错误等运行维护期产生的漏洞"},{"label":"B","text":"渗透测试是用软件代替人工的一种测试方法，因此测试效率更高"},{"label":"C","text":"渗透测试使用人工进行测试，不依赖软件，因此测试更准确"},{"label":"D","text":"渗透测试中必须要查看软件源代码，因此测试中发现的漏洞更多"}],"id":376},{"type":"single","question":"哪个级别以上的人民政府有关部门在履行网络安全监督管理职责中，发现网络存在较大安全风险或者发生安全事件的，可以按照规定的权限和程序对该网络运营者的法定代表人或者主要负责人进行约谈？（ ）","answer":"C","options":[{"label":"A","text":"地区市政府"},{"label":"B","text":"县政府"},{"label":"C","text":"省政府"},{"label":"D","text":"国务院"}],"id":377},{"type":"single","question":"如果您认为您已经落入网络钓鱼的圈套,则应采取（ ）措施。","answer":"D","options":[{"label":"A","text":"向电子邮件地址或网站被伪造的公司报告该情形"},{"label":"B","text":"更改帐户的密码"},{"label":"C","text":"立即检查财务报表"},{"label":"D","text":"以上全部都是"}],"id":378},{"type":"single","question":"在享受云服务带来的便捷时,数据安全的主动权方是（ ）","answer":"A","options":[{"label":"A","text":"云服务商"},{"label":"B","text":"任意有安全资质的第三方"},{"label":"C","text":"使用云的用户"},{"label":"D","text":"云服务商和用户一致认定的第三方"}],"id":379},{"type":"single","question":"以下哪项是5G独立组网的网络结构特点？（ ）","answer":"B","options":[{"label":"A","text":"双连接"},{"label":"B","text":"需要部署全新的5G核心网"},{"label":"C","text":"需要锚点站支持"},{"label":"D","text":"需要连接4G核心网"}],"id":380},{"type":"single","question":"5G网络系统协同化，智能化水平提升，表现为：（ ）","answer":"D","options":[{"label":"A","text":"网络间复杂地自动调整"},{"label":"B","text":"信号更强"},{"label":"C","text":"切换更灵活"},{"label":"D","text":"多用户，多点，多天线，多摄取的协同组网"}],"id":381},{"type":"single","question":"2.1G低频段应用于5G部署的劣势有？（ ）","answer":"C","options":[{"label":"A","text":"是成本最优建网策略"},{"label":"B","text":"高、低频组合提供城区覆盖优势"},{"label":"C","text":"是城区独立布网的必要条件"},{"label":"D","text":"2.1G4TRVoLTE与2RWCDMA话音覆盖能力相当"}],"id":382},{"type":"single","question":"下列行为符合道德规范的有（ ）","answer":"D","options":[{"label":"A","text":"利用黑客程序,进入别人电脑"},{"label":"B","text":"将收到的病毒程序群发"},{"label":"C","text":"利用刻录机将别人的正版光盘翻刻"},{"label":"D","text":"无意识使用带病毒的软件导致他人计算机瘫痪"}],"id":383},{"type":"single","question":"在以下认证方式中,最常用的认证方式是（ ）","answer":"A","options":[{"label":"A","text":"基于账户名／口令认证"
